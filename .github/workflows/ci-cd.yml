name: 🚀 VITA STRATEGIES CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run nightly backup at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  VM_NAME: vita-strategies-server
  VM_ZONE: europe-west2-a

jobs:
  # =============================================================================
  # VALIDATION & TESTING
  # =============================================================================
  validate:
    name: 🔍 Validate & Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: 📊 Validate scripts
      run: |
        echo "🔍 Validating shell scripts..."
        find scripts/ -name "*.sh" -type f | head -10 | while read script; do
          echo "Checking: $script"
          bash -n "$script" || exit 1
        done
        
        echo "✅ Script validation passed"
        
    - name: 🔐 Security scan
      run: |
        echo "🔍 Scanning for secrets..."
        # Basic secret detection
        if grep -r -i "password\|secret\|key" --include="*.yml" --include="*.yaml" --include="*.sh" . | grep -v "# " | grep -v "example\|placeholder"; then
          echo "⚠️  Potential secrets found - review carefully"
        else
          echo "✅ No hardcoded secrets detected"
        fi
        
    - name: 📋 Terraform validation
      run: |
        if [ -d "terraform/" ]; then
          echo "🔍 Validating Terraform configuration..."
          cd terraform/
          terraform fmt -check -diff
          terraform validate
          echo "✅ Terraform validation passed"
        fi

  # =============================================================================
  # DEPLOYMENT
  # =============================================================================
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔐 Setup GCP Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        
    - name: ☁️  Setup GCP SDK
      uses: google-github-actions/setup-gcloud@v2
      
    - name: 🔍 Check VM status
      run: |
        VM_STATUS=$(gcloud compute instances describe $VM_NAME --zone=$VM_ZONE --format="value(status)" 2>/dev/null || echo "NOT_FOUND")
        echo "VM_STATUS=$VM_STATUS" >> $GITHUB_ENV
        echo "Current VM status: $VM_STATUS"
        
    - name: 🚀 Start VM if needed
      if: env.VM_STATUS != 'RUNNING'
      run: |
        echo "Starting VM..."
        gcloud compute instances start $VM_NAME --zone=$VM_ZONE
        
        # Wait for VM to be ready
        echo "Waiting for VM to be ready..."
        for i in {1..60}; do
          VM_STATUS=$(gcloud compute instances describe $VM_NAME --zone=$VM_ZONE --format="value(status)")
          if [ "$VM_STATUS" = "RUNNING" ]; then
            echo "✅ VM is running"
            break
          fi
          echo "Waiting... ($i/60)"
          sleep 10
        done
        
    - name: 📦 Deploy updates
      run: |
        echo "🚀 Deploying updates to production..."
        
        # Copy updated files to VM
        gcloud compute scp --recurse --zone=$VM_ZONE \
          docker-compose-persistent.yml \
          scripts/ \
          ubuntu@$VM_NAME:/opt/vita-strategies/
          
        # Run deployment script
        gcloud compute ssh ubuntu@$VM_NAME --zone=$VM_ZONE --command="
          cd /opt/vita-strategies
          
          echo '🔄 Pulling latest images...'
          docker-compose -f docker-compose-persistent.yml pull
          
          echo '🔧 Restarting services...'
          docker-compose -f docker-compose-persistent.yml up -d
          
          echo '🧹 Cleaning up old images...'
          docker image prune -f
          
          echo '✅ Deployment complete!'
        "
        
    - name: 🩺 Post-deployment health check
      run: |
        echo "🔍 Running post-deployment health check..."
        
        VM_IP=$(gcloud compute instances describe $VM_NAME --zone=$VM_ZONE --format="value(networkInterfaces[0].accessConfigs[0].natIP)")
        
        # Wait for services to be ready
        sleep 30
        
        # Test key services
        services=("8000:ERPNext" "3000:Metabase" "3001:Grafana")
        failed_services=0
        
        for service in "${services[@]}"; do
          IFS=':' read -r port name <<< "$service"
          
          response=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 10 "http://$VM_IP:$port" || echo "TIMEOUT")
          
          if [[ "$response" =~ ^[2-4][0-9][0-9]$ ]]; then
            echo "✅ $name: OK ($response)"
          else
            echo "❌ $name: FAILED ($response)"
            failed_services=$((failed_services + 1))
          fi
        done
        
        if [ $failed_services -eq 0 ]; then
          echo "🎉 All services are healthy!"
        else
          echo "⚠️  $failed_services services failed health check"
          exit 1
        fi

  # =============================================================================
  # BACKUP & MONITORING
  # =============================================================================
  backup:
    name: 💾 Scheduled Backup
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔐 Setup GCP Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        
    - name: ☁️  Setup GCP SDK
      uses: google-github-actions/setup-gcloud@v2
      
    - name: 💾 Run backup
      run: |
        echo "🗄️  Running scheduled backup..."
        
        VM_STATUS=$(gcloud compute instances describe $VM_NAME --zone=$VM_ZONE --format="value(status)" 2>/dev/null || echo "NOT_FOUND")
        
        if [ "$VM_STATUS" = "RUNNING" ]; then
          gcloud compute ssh ubuntu@$VM_NAME --zone=$VM_ZONE --command="
            cd /opt/vita-strategies
            ./scripts/backup-data.sh
          "
          echo "✅ Backup completed"
        else
          echo "⚠️  VM not running, skipping backup"
        fi
        
    - name: 📊 Run monitoring
      run: |
        echo "📊 Running system monitoring..."
        
        # Copy monitoring script and run it
        gcloud compute scp --zone=$VM_ZONE \
          scripts/monitor-production.sh \
          ubuntu@$VM_NAME:/tmp/
          
        gcloud compute ssh ubuntu@$VM_NAME --zone=$VM_ZONE --command="
          chmod +x /tmp/monitor-production.sh
          /tmp/monitor-production.sh
        "

  # =============================================================================
  # NOTIFICATION
  # =============================================================================
  notify:
    name: 📧 Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy, backup]
    if: always()
    
    steps:
    - name: 📧 Send success notification
      if: needs.deploy.result == 'success' || needs.backup.result == 'success'
      run: |
        echo "✅ VITA STRATEGIES: Operation completed successfully"
        echo "📅 Time: $(date)"
        echo "🔗 Commit: ${{ github.sha }}"
        
        # In production, this would send actual notifications:
        # - Email to team
        # - Slack/Teams message
        # - Dashboard update
        
    - name: 🚨 Send failure notification
      if: needs.deploy.result == 'failure' || needs.backup.result == 'failure'
      run: |
        echo "❌ VITA STRATEGIES: Operation failed"
        echo "📅 Time: $(date)"
        echo "🔗 Commit: ${{ github.sha }}"
        echo "📋 Job results:"
        echo "   Deploy: ${{ needs.deploy.result }}"
        echo "   Backup: ${{ needs.backup.result }}"
        
        # In production, this would send urgent alerts:
        # - Email to on-call team
        # - SMS notifications
        # - PagerDuty/Incident management
        
        exit 1
