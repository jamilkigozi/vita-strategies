version: '3.8'

networks:
  vita-network:
    driver: bridge

volumes:
  erpnext_db_data:
  erpnext_sites:
  windmill_db_data:
  metabase_data:
  grafana_data:
  mattermost_data:
  mattermost_logs:
  mattermost_config:
  mattermost_plugins:

services:
  # Database for ERPNext
  erpnext-db:
    image: mariadb:10.6
    container_name: erpnext-db
    environment:
      MYSQL_ROOT_PASSWORD: vita_secure_2024
      MYSQL_DATABASE: erpnext
      MYSQL_USER: erpnext
      MYSQL_PASSWORD: vita_secure_2024
    volumes:
      - erpnext_db_data:/var/lib/mysql
    networks:
      - vita-network
    restart: unless-stopped

  # Redis for ERPNext queues
  erpnext-redis-queue:
    image: redis:6-alpine
    container_name: erpnext-redis-queue
    networks:
      - vita-network
    restart: unless-stopped

  # Redis for ERPNext cache
  erpnext-redis-cache:
    image: redis:6-alpine
    container_name: erpnext-redis-cache
    networks:
      - vita-network
    restart: unless-stopped

  # ERPNext application
  erpnext:
    image: frappe/erpnext:v15
    container_name: erpnext
    environment:
      - DB_HOST=erpnext-db
      - DB_ROOT_PASSWORD=vita_secure_2024
      - REDIS_QUEUE=redis://erpnext-redis-queue:6379
      - REDIS_CACHE=redis://erpnext-redis-cache:6379
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
    depends_on:
      - erpnext-db
      - erpnext-redis-queue
      - erpnext-redis-cache
    networks:
      - vita-network
    restart: unless-stopped

  # Windmill workflow automation
  windmill:
    image: ghcr.io/windmill-labs/windmill:main
    container_name: windmill
    environment:
      - DATABASE_URL=postgres://windmill:windmill_pass@windmill-db:5432/windmill
      - RUST_LOG=info
    depends_on:
      - windmill-db
    networks:
      - vita-network
    restart: unless-stopped

  # Database for Windmill
  windmill-db:
    image: postgres:13
    container_name: windmill-db
    environment:
      POSTGRES_DB: windmill
      POSTGRES_USER: windmill
      POSTGRES_PASSWORD: windmill_pass
    volumes:
      - windmill_db_data:/var/lib/postgresql/data
    networks:
      - vita-network
    restart: unless-stopped

  # Metabase analytics
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    environment:
      - MB_DB_TYPE=h2
    volumes:
      - metabase_data:/metabase-data
    networks:
      - vita-network
    restart: unless-stopped

  # Grafana monitoring
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=vita_admin_2024
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - vita-network
    restart: unless-stopped

  # Mattermost team communication
  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: mattermost
    environment:
      - MM_SQLSETTINGS_DRIVERNAME=postgres
      - MM_SQLSETTINGS_DATASOURCE=postgres://mattermost:mattermost_pass@mattermost-db:5432/mattermost?sslmode=disable&connect_timeout=10
    volumes:
      - mattermost_data:/mattermost/data
      - mattermost_logs:/mattermost/logs
      - mattermost_config:/mattermost/config
      - mattermost_plugins:/mattermost/plugins
    depends_on:
      - mattermost-db
    networks:
      - vita-network
    restart: unless-stopped

  # Database for Mattermost
  mattermost-db:
    image: postgres:13
    container_name: mattermost-db
    environment:
      POSTGRES_DB: mattermost
      POSTGRES_USER: mattermost
      POSTGRES_PASSWORD: mattermost_pass
    volumes:
      - /var/lib/postgresql/data
    networks:
      - vita-network
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - erpnext
      - windmill
      - metabase
      - grafana
      - mattermost
    networks:
      - vita-network
    restart: unless-stopped