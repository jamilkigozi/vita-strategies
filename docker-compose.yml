version: '3.8'

networks:
  vita-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16

services:
  # ============================================================================
  # DATABASE SERVICES
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_2024_london!
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - vita-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 10s
      retries: 3

  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root_secure_2024_london!
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress_secure_2024_london!
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - vita-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # REVERSE PROXY
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - vita-network
    restart: unless-stopped
    depends_on:
      - wordpress
      - erpnext
      - mattermost
      - metabase
      - grafana
      - keycloak
      - bookstack
      - appsmith
      - openbao

  # ============================================================================
  # CONTENT MANAGEMENT
  # ============================================================================
  wordpress:
    image: wordpress:latest
    container_name: wordpress
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress_secure_2024_london!
    volumes:
      - /mnt/buckets/wordpress:/var/www/html/wp-content
    networks:
      - vita-network
    restart: unless-stopped
    depends_on:
      - mariadb

  # ============================================================================
  # BUSINESS APPLICATIONS
  # ============================================================================
  erpnext:
    image: frappe/erpnext:v15
    container_name: erpnext
    environment:
      MARIADB_HOST: mariadb
      MARIADB_DATABASE: erpnext
      MARIADB_USER: erpnext
      MARIADB_PASSWORD: erpnext_secure_2024_london!
    volumes:
      - /mnt/buckets/erpnext:/home/frappe/frappe-bench/sites
    networks:
      - vita-network
    restart: unless-stopped
    depends_on:
      - mariadb

  # ============================================================================
  # TEAM COLLABORATION
  # ============================================================================
  mattermost:
    image: mattermost/mattermost-team-edition:8.1
    container_name: mattermost
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mattermost:mattermost_secure_2024_london!@postgres:5432/mattermost?sslmode=disable
      MM_SERVICESETTINGS_SITEURL: https://chat.vitastrategies.com
    volumes:
      - /mnt/buckets/mattermost:/mattermost/data
    networks:
      - vita-network
    restart: unless-stopped
    depends_on:
      - postgres

  bookstack:
    image: linuxserver/bookstack:latest
    container_name: bookstack
    environment:
      PUID: 1000
      PGID: 1000
      DB_HOST: mariadb
      DB_USER: bookstack
      DB_PASS: bookstack_secure_2024_london!
      DB_DATABASE: bookstack
      APP_URL: https://docs.vitastrategies.com
    volumes:
      - /mnt/buckets/docs:/config
    networks:
      - vita-network
    restart: unless-stopped
    depends_on:
      - mariadb

  # ============================================================================
  # ANALYTICS & MONITORING
  # ============================================================================
  metabase:
    image: metabase/metabase:v0.47.0
    container_name: metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_DBNAME: metabase
      MB_DB_USER: metabase
      MB_DB_PASS: metabase_secure_2024_london!
    volumes:
      - /mnt/buckets/analytics:/metabase-data
    networks:
      - vita-network
    restart: unless-stopped
    depends_on:
      - postgres

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    environment:
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana
      GF_DATABASE_PASSWORD: grafana_secure_2024_london!
      GF_SERVER_ROOT_URL: https://monitoring.vitastrategies.com
    volumes:
      - /mnt/buckets/monitoring:/var/lib/grafana
    networks:
      - vita-network
    restart: unless-stopped
    depends_on:
      - postgres

  # ============================================================================
  # SECURITY & IDENTITY
  # ============================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:22.0
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_secure_2024_london!
      KC_HOSTNAME: auth.vitastrategies.com
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: secure_admin_password_123
    command: start-dev
    volumes:
      - /mnt/buckets/auth:/opt/keycloak/data
    networks:
      - vita-network
    restart: unless-stopped
    depends_on:
      - postgres

  openbao:
    image: openbao/openbao:latest
    container_name: openbao
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: myroot
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: https://vault.vitastrategies.com
    volumes:
      - /mnt/buckets/vault:/vault/data
    cap_add:
      - IPC_LOCK
    networks:
      - vita-network
    restart: unless-stopped

  # ============================================================================
  # LOW-CODE PLATFORM
  # ============================================================================
  appsmith:
    image: appsmith/appsmith-ce:latest
    container_name: appsmith
    environment:
      APPSMITH_ENCRYPTION_PASSWORD: password
      APPSMITH_ENCRYPTION_SALT: salt
      APPSMITH_DB_URL: postgres://postgres:postgres_secure_2024_london!@postgres:5432/appsmith
    volumes:
      - /mnt/buckets/appsmith:/appsmith-stacks
    networks:
      - vita-network
    restart: unless-stopped
    depends_on:
      - postgres

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  postgres_data:
    driver: local
  mariadb_data:
    driver: local
