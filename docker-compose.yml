version: '3.8'

networks:
  vita-network:
    driver: bridge

services:
  # --- Core Infrastructure ---

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    networks:
      - vita-network
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080" # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik:/etc/traefik
      - ./letsencrypt:/letsencrypt
    command:
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ADMIN_EMAIL:-admin@vitastrategies.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.vitastrategies.com`)"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    networks:
      - vita-network
    volumes:
      - /mnt/buckets/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d # For initial DB setup
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: postgres
    labels:
      - "traefik.enable=false"

  mariadb:
    image: mariadb:11.1
    container_name: mariadb
    restart: unless-stopped
    networks:
      - vita-network
    volumes:
      - /mnt/buckets/mariadb:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    labels:
      - "traefik.enable=false"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - vita-network
    labels:
      - "traefik.enable=false"

  # --- Applications ---

  wordpress:
    image: wordpress:6.4-apache
    container_name: wordpress
    restart: unless-stopped
    networks:
      - vita-network
    volumes:
      - /mnt/buckets/wordpress:/var/www/html
    environment:
      WORDPRESS_DB_HOST: mariadb
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    depends_on:
      - mariadb
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wordpress.rule=Host(`vitastrategies.com`) || Host(`www.vitastrategies.com`)"
      - "traefik.http.routers.wordpress.tls.certresolver=letsencrypt"
      - "traefik.http.services.wordpress.loadbalancer.server.port=80"

  erpnext:
    image: frappe/erpnext:v15
    container_name: erpnext
    restart: unless-stopped
    networks:
      - vita-network
    volumes:
      - /mnt/buckets/erpnext:/home/frappe/frappe-bench/sites
    environment:
      MARIADB_HOST: mariadb
      MARIADB_ROOT_PASSWORD: ${ERPNEXT_DB_PASSWORD} # This should likely be a different user
      MARIADB_DATABASE: erpnext
      MARIADB_USER: erpnext
      MARIADB_PASSWORD: ${ERPNEXT_DB_PASSWORD}
    depends_on:
      - mariadb
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.erpnext.rule=Host(`erp.vitastrategies.com`)"
      - "traefik.http.routers.erpnext.tls.certresolver=letsencrypt"
      - "traefik.http.services.erpnext.loadbalancer.server.port=8000"

  mattermost:
    image: mattermost/mattermost-team-edition:8.1
    container_name: mattermost
    restart: unless-stopped
    networks:
      - vita-network
    volumes:
      - /mnt/buckets/mattermost/data:/mattermost/data
      - /mnt/buckets/mattermost/config:/mattermost/config
      - /mnt/buckets/mattermost/logs:/mattermost/logs
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mattermost:${MATTERMOST_DB_PASSWORD}@postgres:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: https://chat.vitastrategies.com
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mattermost.rule=Host(`chat.vitastrategies.com`)"
      - "traefik.http.routers.mattermost.tls.certresolver=letsencrypt"
      - "traefik.http.services.mattermost.loadbalancer.server.port=8065"

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    networks:
      - vita-network
    volumes:
      - /mnt/buckets/monitoring:/var/lib/grafana
    environment:
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana
      GF_DATABASE_PASSWORD: ${GRAFANA_DB_PASSWORD}
      GF_SERVER_ROOT_URL: https://monitoring.vitastrategies.com
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`monitoring.vitastrategies.com`)"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  metabase:
    image: metabase/metabase:v0.47.0
    container_name: metabase
    restart: unless-stopped
    networks:
      - vita-network
    volumes:
      - /mnt/buckets/analytics:/metabase-data
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_HOST: postgres
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.metabase.rule=Host(`analytics.vitastrategies.com`)"
      - "traefik.http.routers.metabase.tls.certresolver=letsencrypt"
      - "traefik.http.services.metabase.loadbalancer.server.port=3000"

  keycloak:
    image: quay.io/keycloak/keycloak:22.0
    container_name: keycloak
    restart: unless-stopped
    networks:
      - vita-network
    volumes:
      - /mnt/buckets/auth:/opt/keycloak/data
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: auth.vitastrategies.com
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: start --optimized
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`auth.vitastrategies.com`)"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  appsmith:
    image: appsmith/appsmith-ce:latest
    container_name: appsmith
    restart: unless-stopped
    networks:
      - vita-network
    volumes:
      - /mnt/buckets/appsmith:/appsmith-stacks
    environment:
      APPSMITH_MONGODB_URI: mongodb://mongo:27017/appsmith # This implies a mongo service is needed
      APPSMITH_REDIS_URL: redis://redis:6379
      APPSMITH_ENCRYPTION_PASSWORD: ${APPSMITH_ENCRYPTION_PASSWORD}
      APPSMITH_ENCRYPTION_SALT: ${APPSMITH_ENCRYPTION_SALT}
    depends_on:
      - redis
      # - mongo # Uncomment if you add a mongo service
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.appsmith.rule=Host(`apps.vitastrategies.com`)"
      - "traefik.http.routers.appsmith.tls.certresolver=letsencrypt"
      - "traefik.http.services.appsmith.loadbalancer.server.port=80"

  windmill:
    build:
      context: ./apps/windmill
      dockerfile: Dockerfile
    container_name: windmill
    restart: unless-stopped
    networks:
      - vita-network
    volumes:
      - /mnt/buckets/windmill:/opt/windmill/data
    environment:
      DATABASE_URL: postgresql://windmill:${WINDMILL_DB_PASSWORD}@postgres:5432/windmill
      REDIS_URL: redis://redis:6379
      WINDMILL_SERVER_URL: https://flows.vitastrategies.com
    depends_on:
      - postgres
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.windmill.rule=Host(`flows.vitastrategies.com`)"
      - "traefik.http.routers.windmill.tls.certresolver=letsencrypt"
      - "traefik.http.services.windmill.loadbalancer.server.port=8000"
