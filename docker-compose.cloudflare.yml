version: '3.8'

networks:
  vita-network:
    driver: bridge

services:
  # Cloud SQL Proxy
  cloud-sql-proxy:
    image: gcr.io/cloudsql-docker/gce-proxy:1.33.2
    container_name: cloud-sql-proxy
    restart: unless-stopped
    networks:
      - vita-network
    command:
      - "/cloud_sql_proxy"
      - "-instances=vita-strategies:europe-west2:vita-strategies-postgresql-primary=tcp:0.0.0.0:5432"
      - "-instances=vita-strategies:europe-west2:vita-strategies-mysql-primary=tcp:0.0.0.0:3306"
      - "-instances=vita-strategies:europe-west2:vita-strategies-mariadb-erp=tcp:0.0.0.0:3307"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - vita-network
    command: redis-server --requirepass ${REDIS_PASSWORD}

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: unless-stopped
    networks:
      - vita-network
    volumes:
      - /mnt/buckets/mongodb:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}

  # Applications (direct port exposure)
  wordpress:
    image: wordpress:6.4-apache
    container_name: wordpress
    restart: unless-stopped
    networks:
      - vita-network
    ports:
      - "8001:80"
    volumes:
      - /mnt/buckets/wordpress:/var/www/html
    environment:
      WORDPRESS_DB_HOST: cloud-sql-proxy
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_PORT: 3306
    depends_on:
      - cloud-sql-proxy

  erpnext:
    image: frappe/erpnext:v15
    container_name: erpnext
    restart: unless-stopped
    networks:
      - vita-network
    ports:
      - "8006:8000"
    volumes:
      - /mnt/buckets/erpnext:/home/frappe/frappe-bench/sites
    environment:
      MARIADB_HOST: cloud-sql-proxy
      MARIADB_PORT: 3307
      MARIADB_DATABASE: erpnext
      MARIADB_USER: erpnext
      MARIADB_PASSWORD: ${ERPNEXT_DB_PASSWORD}
    depends_on:
      - cloud-sql-proxy

  mattermost:
    image: mattermost/mattermost-team-edition:8.1
    container_name: mattermost
    restart: unless-stopped
    networks:
      - vita-network
    ports:
      - "8005:8065"
    volumes:
      - /mnt/buckets/mattermost/data:/mattermost/data
      - /mnt/buckets/mattermost/config:/mattermost/config
      - /mnt/buckets/mattermost/logs:/mattermost/logs
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mattermost:${MATTERMOST_DB_PASSWORD}@cloud-sql-proxy:5432/mattermost?sslmode=disable&connect_timeout=10
      MM_SERVICESETTINGS_SITEURL: https://chat.vitastrategies.com
    depends_on:
      - cloud-sql-proxy

  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    restart: unless-stopped
    networks:
      - vita-network
    ports:
      - "8008:3000"
    volumes:
      - /mnt/buckets/monitoring:/var/lib/grafana
    environment:
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: cloud-sql-proxy:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana
      GF_DATABASE_PASSWORD: ${GRAFANA_DB_PASSWORD}
      GF_SERVER_ROOT_URL: https://monitoring.vitastrategies.com
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    depends_on:
      - cloud-sql-proxy

  metabase:
    image: metabase/metabase:v0.47.0
    container_name: metabase
    restart: unless-stopped
    networks:
      - vita-network
    ports:
      - "8002:3000"
    volumes:
      - /mnt/buckets/analytics:/metabase-data
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_HOST: cloud-sql-proxy
    depends_on:
      - cloud-sql-proxy

  keycloak:
    image: quay.io/keycloak/keycloak:22.0
    container_name: keycloak
    restart: unless-stopped
    networks:
      - vita-network
    ports:
      - "8004:8080"
    volumes:
      - /mnt/buckets/auth:/opt/keycloak/data
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://cloud-sql-proxy:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: auth.vitastrategies.com
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: start --optimized
    depends_on:
      - cloud-sql-proxy

  appsmith:
    image: appsmith/appsmith-ce:latest
    container_name: appsmith
    restart: unless-stopped
    networks:
      - vita-network
    ports:
      - "8003:80"
    volumes:
      - /mnt/buckets/appsmith:/appsmith-stacks
    environment:
      APPSMITH_MONGODB_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongodb:27017/appsmith
      APPSMITH_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      APPSMITH_ENCRYPTION_PASSWORD: ${APPSMITH_ENCRYPTION_PASSWORD}
      APPSMITH_ENCRYPTION_SALT: ${APPSMITH_ENCRYPTION_SALT}
    depends_on:
      - redis
      - mongodb

  windmill:
    image: windmillhq/windmill:main
    container_name: windmill
    restart: unless-stopped
    networks:
      - vita-network
    ports:
      - "8007:8000"
    volumes:
      - /mnt/buckets/windmill:/opt/windmill/data
    environment:
      DATABASE_URL: postgresql://windmill:${WINDMILL_DB_PASSWORD}@cloud-sql-proxy:5432/windmill
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      WINDMILL_SERVER_URL: https://flows.vitastrategies.com
    depends_on:
      - cloud-sql-proxy
      - redis