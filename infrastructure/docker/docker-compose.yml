version: '3.8'

# Vita Strategies - Production Docker Compose
# Purpose: Orchestrate all 12 microservices with proper networking and dependencies

networks:
  vita-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres-data:
  mysql-data:
  mariadb-data:
  grafana-data:
  keycloak-data:
  openbao-data:
  erpnext_sites:

services:
  # ============================================================================
  # REVERSE PROXY & LOAD BALANCER
  # ============================================================================
  nginx:
    build: ./nginx
    container_name: vita-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /var/log/nginx:/var/log/nginx
      - erpnext_sites:/var/www/html/erpnext:ro
    networks:
      vita-network:
        ipv4_address: 172.20.0.10
    restart: unless-stopped
    depends_on:
      - wordpress
      - erpnext
      - mattermost
      - keycloak
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # WEB & CONTENT MANAGEMENT
  # ============================================================================
  wordpress:
    image: wordpress:latest
    container_name: vita-wordpress
    environment:
      WORDPRESS_DB_HOST: ${MYSQL_HOST}
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_TABLE_PREFIX: wp_
    volumes:
      - /mnt/buckets/wordpress:/var/www/html/wp-content
    networks:
      vita-network:
        ipv4_address: 172.20.0.20
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # BUSINESS APPLICATIONS
  # ============================================================================
  erpnext:
    image: frappe/erpnext:latest
    container_name: vita-erpnext
    environment:
      DB_HOST: ${MARIADB_HOST}
      DB_PORT: 3306
      DB_NAME: erpnext
      DB_USER: erpnext
      DB_PASSWORD: ${ERPNEXT_DB_PASSWORD}
    volumes:
      - /mnt/buckets/erpnext:/home/frappe/frappe-bench/sites
    networks:
      vita-network:
        ipv4_address: 172.20.0.30
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # TEAM COLLABORATION
  # ============================================================================
  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: vita-mattermost
    environment:
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mattermost:${MATTERMOST_DB_PASSWORD}@${POSTGRES_HOST}:5432/mattermost?sslmode=disable
      MM_SERVICESETTINGS_SITEURL: https://chat.vitastrategies.com
    volumes:
      - /mnt/buckets/mattermost:/mattermost/data
      - /mnt/buckets/mattermost/logs:/mattermost/logs
    networks:
      vita-network:
        ipv4_address: 172.20.0.40
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8065/api/v4/system/ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  mattermost-db:
    image: postgres:13-alpine
    container_name: mattermost-db
    restart: unless-stopped
    volumes:
      - mattermost_db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=mattermost
      - POSTGRES_PASSWORD=${MATTERMOST_DB_PASSWORD}
      - POSTGRES_DB=mattermost
    networks:
      vita-network:
        ipv4_address: 172.20.0.41

  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: vita-bookstack
    environment:
      PUID: 1000
      PGID: 1000
      APP_URL: https://docs.vitastrategies.com
      DB_HOST: ${MYSQL_HOST}
      DB_PORT: 3306
      DB_USER: bookstack
      DB_PASS: ${BOOKSTACK_DB_PASSWORD}
      DB_DATABASE: bookstack
    volumes:
      - /mnt/buckets/docs:/config
    networks:
      vita-network:
        ipv4_address: 172.20.0.50
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # DEVELOPMENT & AUTOMATION
  # ============================================================================
  windmill:
    image: windmill-community/windmill:main
    container_name: vita-windmill
    environment:
      DATABASE_URL: postgres://windmill:${WINDMILL_DB_PASSWORD}@${POSTGRES_HOST}:5432/windmill
      BASE_URL: https://workflows.vitastrategies.com
    volumes:
      - /mnt/buckets/workflows:/tmp/windmill
    networks:
      vita-network:
        ipv4_address: 172.20.0.60
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3

  appsmith:
    image: appsmith/appsmith-ce:latest
    container_name: vita-appsmith
    environment:
      APPSMITH_ENCRYPTION_PASSWORD: ${APPSMITH_ENCRYPTION_PASSWORD}
      APPSMITH_ENCRYPTION_SALT: ${APPSMITH_ENCRYPTION_SALT}
      APPSMITH_MONGODB_URI: mongodb://localhost:27017/appsmith
    volumes:
      - /mnt/buckets/appsmith:/appsmith-stacks
    networks:
      vita-network:
        ipv4_address: 172.20.0.70
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # ANALYTICS & MONITORING
  # ============================================================================
  metabase:
    image: metabase/metabase:latest
    container_name: vita-metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: ${METABASE_DB_PASSWORD}
      MB_DB_HOST: ${POSTGRES_HOST}
    volumes:
      - /mnt/buckets/analytics:/metabase-data
    networks:
      vita-network:
        ipv4_address: 172.20.0.80
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:latest
    container_name: vita-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: ${POSTGRES_HOST}:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana
      GF_DATABASE_PASSWORD: ${GRAFANA_DB_PASSWORD}
      GF_SERVER_ROOT_URL: https://monitoring.vitastrategies.com
    volumes:
      - /mnt/buckets/monitoring:/var/lib/grafana
      - grafana-data:/var/lib/grafana
    networks:
      vita-network:
        ipv4_address: 172.20.0.90
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # SECURITY & IDENTITY
  # ============================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: vita-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${POSTGRES_HOST}:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: auth.vitastrategies.com
      KC_HTTP_ENABLED: true
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: start-dev
    volumes:
      - /mnt/buckets/auth:/opt/keycloak/data
      - keycloak-data:/opt/keycloak/data
    networks:
      vita-network:
        ipv4_address: 172.20.0.100
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  openbao:
    image: openbao/openbao:latest
    container_name: vita-openbao
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${OPENBAO_ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: https://vault.vitastrategies.com
    volumes:
      - /mnt/buckets/vault:/vault/data
      - openbao-data:/vault/data
    cap_add:
      - IPC_LOCK
    networks:
      vita-network:
        ipv4_address: 172.20.0.110
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8200/v1/sys/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================================
  # BACKUP SERVICE
  # ============================================================================
  backup-service:
    build: ../apps/backup-service
    container_name: vita-backup
    environment:
      BACKUP_SCHEDULE: "0 2 * * *"  # Daily at 2 AM
      POSTGRES_HOST: ${POSTGRES_HOST}
      MYSQL_HOST: ${MYSQL_HOST}
      MARIADB_HOST: ${MARIADB_HOST}
    volumes:
      - /mnt/buckets/data-backup:/backup
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      vita-network:
        ipv4_address: 172.20.0.120
    restart: unless-stopped
