# ERPNext Site Configuration
# Subdomain: erp.vitastrategies.com
# Business application with enhanced security

server {
    listen 80;
    server_name erp.vitastrategies.com;
    
    # Rate limiting
    limit_req zone=global burst=20 nodelay;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name erp.vitastrategies.com;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/vitastrategies.com.crt;
    ssl_certificate_key /etc/nginx/ssl/vitastrategies.com.key;
    
    # Security headers
    include /etc/nginx/security-headers.conf;
    
    # Enhanced CSP for business app
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    
    # Rate limiting
    limit_req zone=global burst=20 nodelay;
    
    # Logging
    access_log /var/log/nginx/erpnext.access.log main;
    error_log /var/log/nginx/erpnext.error.log;
    
    # Large file uploads for business documents
    client_max_body_size 200M;
    
    # Main location block
    location / {
        proxy_pass http://erpnext_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        
        # Extended timeouts for complex queries
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Proxy buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # ERPNext login rate limiting
    location /login {
        limit_req zone=login burst=3 nodelay;
        
        proxy_pass http://erpnext_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # API endpoints
    location /api/ {
        limit_req zone=api burst=100 nodelay;
        
        proxy_pass http://erpnext_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Static assets with long caching
    location /assets/ {
        alias /var/www/html/erpnext/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        try_files $uri =404;
    }
    
    # Files and attachments
    location /files/ {
        proxy_pass http://erpnext_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Large file handling
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
    }
    
    # WebSocket support for real-time updates
    location /socket.io/ {
        proxy_pass http://erpnext_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_read_timeout 86400;
    }
    
    # Security: Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
