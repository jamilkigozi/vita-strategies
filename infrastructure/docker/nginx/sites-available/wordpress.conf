# WordPress Site Configuration
# Primary domain: vitastrategies.com
# SSL termination with Cloudflare

server {
    listen 80;
    server_name vitastrategies.com www.vitastrategies.com;
    
    # Security headers
    include /etc/nginx/security-headers.conf;
    
    # Rate limiting
    limit_req zone=global burst=20 nodelay;
    
    # Redirect to HTTPS (handled by Cloudflare)
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vitastrategies.com www.vitastrategies.com;
    
    # SSL Configuration (Cloudflare Origin Certificate)
    ssl_certificate /etc/nginx/ssl/vitastrategies.com.crt;
    ssl_certificate_key /etc/nginx/ssl/vitastrategies.com.key;
    
    # Security headers
    include /etc/nginx/security-headers.conf;
    
    # Rate limiting
    limit_req zone=global burst=20 nodelay;
    
    # Logging
    access_log /var/log/nginx/wordpress.access.log main;
    error_log /var/log/nginx/wordpress.error.log;
    
    # Root and index
    root /var/www/html;
    index index.php index.html index.htm;
    
    # WordPress-specific settings
    client_max_body_size 100M;
    
    # Main location block
    location / {
        # WordPress permalink structure
        try_files $uri $uri/ /index.php?$args;
        
        # Proxy to WordPress container
        proxy_pass http://wordpress_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Proxy timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Proxy buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }
    
    # WordPress admin rate limiting
    location ~ ^/wp-(admin|login) {
        limit_req zone=login burst=5 nodelay;
        
        proxy_pass http://wordpress_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # WordPress API rate limiting
    location ~ ^/wp-json/ {
        limit_req zone=api burst=50 nodelay;
        
        proxy_pass http://wordpress_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Static file handling with caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|txt|tar|gz)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        
        # Try local files first, then proxy
        try_files $uri @wordpress;
    }
    
    # Fallback for static files
    location @wordpress {
        proxy_pass http://wordpress_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Security: Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # WordPress security
    location ~ ^/(wp-config\.php|readme\.html|license\.txt) {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block PHP execution in uploads
    location /wp-content/uploads/ {
        location ~ \.php$ {
            deny all;
        }
    }
    
    # Favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
    
    # Robots.txt
    location = /robots.txt {
        log_not_found off;
        access_log off;
        allow all;
    }
}
