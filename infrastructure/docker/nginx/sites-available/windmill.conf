# Windmill Workflow Automation Platform
# Production-optimized Nginx configuration with WebSocket support

# Upstream definition for Windmill application servers
upstream windmill_backend {
    # Primary Windmill server
    server windmill:8000 weight=1 max_fails=3 fail_timeout=30s;
    
    # Additional servers for high availability (uncomment when scaling)
    # server windmill-2:8000 weight=1 max_fails=3 fail_timeout=30s backup;
    # server windmill-3:8000 weight=1 max_fails=3 fail_timeout=30s backup;
    
    # Load balancing configuration
    least_conn;
    keepalive 32;
}

# Upstream for metrics endpoint
upstream windmill_metrics {
    server windmill:8001 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 8;
}

# Rate limiting zones for Windmill
limit_req_zone $binary_remote_addr zone=windmill_auth:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=windmill_api:10m rate=200r/m;
limit_req_zone $binary_remote_addr zone=windmill_web:10m rate=50r/m;
limit_req_zone $binary_remote_addr zone=windmill_webhook:10m rate=100r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=windmill_conn:10m;

# Main Windmill virtual host
server {
    listen 80;
    listen [::]:80;
    server_name windmill.vitastrategies.com;
    
    # Security headers
    include /etc/nginx/security-headers.conf;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS Windmill configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name windmill.vitastrategies.com;
    
    # SSL Configuration (Cloudflare Origin Certificate)
    ssl_certificate /etc/nginx/ssl/windmill.vitastrategies.com.pem;
    ssl_certificate_key /etc/nginx/ssl/windmill.vitastrategies.com.key;
    ssl_client_certificate /etc/nginx/ssl/cloudflare-origin-ca.pem;
    ssl_verify_client on;
    
    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/nginx/ssl/cloudflare-origin-ca.pem;
    
    # Security headers
    include /etc/nginx/security-headers.conf;
    
    # Windmill-specific security headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' cdn.jsdelivr.net cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdn.jsdelivr.net; font-src 'self' fonts.gstatic.com cdn.jsdelivr.net; img-src 'self' data: blob: *.vitastrategies.com; connect-src 'self' wss://windmill.vitastrategies.com; frame-src 'self'; object-src 'none'; base-uri 'self'; worker-src 'self' blob:;" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), accelerometer=(), gyroscope=()" always;
    
    # Connection limiting
    limit_conn windmill_conn 100;
    
    # Logging
    access_log /var/log/nginx/windmill.access.log combined buffer=16k flush=5m;
    error_log /var/log/nginx/windmill.error.log warn;
    
    # Root directory for static files
    root /var/www/windmill;
    index index.html;
    
    # Client settings for file uploads and large workflows
    client_max_body_size 100M;
    client_body_buffer_size 32k;
    client_header_buffer_size 8k;
    large_client_header_buffers 8 32k;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/xhtml+xml
        application/xml
        application/wasm
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;
    
    # API endpoints
    location ^~ /api/ {
        # Rate limiting for API
        limit_req zone=windmill_api burst=100 nodelay;
        
        # Proxy to Windmill API
        proxy_pass http://windmill_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cache_bypass $http_upgrade;
        
        # API-specific settings
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;
        
        # Extended timeouts for long-running workflows
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # CORS headers for API
        add_header Access-Control-Allow-Origin "https://windmill.vitastrategies.com" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
        add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization, X-Windmill-Token" always;
        add_header Access-Control-Allow-Credentials true always;
        
        # Handle preflight OPTIONS requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "https://windmill.vitastrategies.com" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS, PATCH" always;
            add_header Access-Control-Allow-Headers "Origin, X-Requested-With, Content-Type, Accept, Authorization, X-Windmill-Token" always;
            add_header Access-Control-Allow-Credentials true always;
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }
    
    # Webhook endpoints (external integrations)
    location ^~ /webhooks/ {
        # Rate limiting for webhooks
        limit_req zone=windmill_webhook burst=50 nodelay;
        
        # Proxy to Windmill webhooks
        proxy_pass http://windmill_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Webhook-specific settings
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Timeouts for webhook processing
        proxy_connect_timeout 15s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Security for webhooks
        add_header X-Content-Type-Options nosniff always;
    }
    
    # Authentication endpoints (stricter rate limiting)
    location ^~ /api/auth/ {
        # Strict rate limiting for authentication
        limit_req zone=windmill_auth burst=5 nodelay;
        
        # Proxy to Windmill auth
        proxy_pass http://windmill_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Security for auth endpoints
        proxy_connect_timeout 15s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Additional security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
    }
    
    # WebSocket connections for real-time updates
    location ^~ /ws {
        # Rate limiting for WebSocket connections
        limit_req zone=windmill_web burst=20 nodelay;
        
        # Proxy to Windmill WebSocket server
        proxy_pass http://windmill_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket settings
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # Keep connections alive
        proxy_connect_timeout 5s;
        tcp_nodelay on;
    }
    
    # Metrics endpoint (internal monitoring)
    location ^~ /metrics {
        # Allow only internal access
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        
        # Proxy to metrics server
        proxy_pass http://windmill_metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Quick timeouts for metrics
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        
        # Disable logging for metrics
        access_log off;
    }
    
    # Health check endpoint (internal)
    location /health {
        # Rate limiting for health checks
        limit_req zone=windmill_web burst=10 nodelay;
        
        # Allow only internal access
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        
        # Proxy to health check
        proxy_pass http://windmill_backend/api/version;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Quick timeouts for health checks
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        
        # Disable logging for health checks
        access_log off;
    }
    
    # Static assets with caching
    location ~* ^/(assets|static)/ {
        # Rate limiting for assets
        limit_req zone=windmill_web burst=100 nodelay;
        
        # Proxy to Windmill for asset serving
        proxy_pass http://windmill_backend;
        proxy_set_header Host $host;
        
        # Cache headers
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # Security for static files
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        
        # Optimized file serving
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        
        # Log only errors for static files
        access_log off;
        error_log /var/log/nginx/windmill.error.log error;
    }
    
    # Workflow execution results and files
    location ~* ^/(results|files)/ {
        # Rate limiting for file access
        limit_req zone=windmill_api burst=50 nodelay;
        
        # Proxy to Windmill for file handling
        proxy_pass http://windmill_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # File handling settings
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        
        # Extended timeouts for large files
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Security headers for files
        add_header X-Content-Type-Options nosniff;
        add_header X-Download-Options noopen;
        add_header X-Permitted-Cross-Domain-Policies none;
    }
    
    # Admin interface (additional security)
    location ^~ /admin {
        # Rate limiting for admin interface
        limit_req zone=windmill_web burst=20 nodelay;
        
        # IP whitelist for admin access (uncomment and configure)
        # allow 192.168.1.0/24;
        # allow 10.0.0.0/8;
        # deny all;
        
        # Proxy to Windmill admin
        proxy_pass http://windmill_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Enhanced security for admin
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        
        # Standard proxy settings
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Main application (catch-all)
    location / {
        # Rate limiting for web interface
        limit_req zone=windmill_web burst=50 nodelay;
        
        # Proxy to Windmill application
        proxy_pass http://windmill_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cache_bypass $http_upgrade;
        
        # Buffering and performance
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;
        
        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Error handling
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;
        
        # Cache bypass for dynamic content
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # Security: Block common attack patterns
    location ~* /(?:uploads|files|wp-content|admin|phpmyadmin|sqlmanager|typo3|drupal) {
        deny all;
        return 444;
    }
    
    # Security: Block file extensions
    location ~* \.(htaccess|htpasswd|ini|phps|fla|psd|log|sh)$ {
        deny all;
        return 444;
    }
    
    # Custom error pages
    error_page 400 /error/400.html;
    error_page 401 /error/401.html;
    error_page 403 /error/403.html;
    error_page 404 /error/404.html;
    error_page 500 502 503 504 /error/50x.html;
    
    location ^~ /error/ {
        alias /var/www/error/;
        internal;
    }
}

# Additional security: Block direct IP access
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    
    # Dummy SSL certificate for default server
    ssl_certificate /etc/nginx/ssl/default.pem;
    ssl_certificate_key /etc/nginx/ssl/default.key;
    
    server_name _;
    
    # Log suspicious direct IP access
    access_log /var/log/nginx/direct_ip_access.log combined;
    
    # Return 444 (connection closed) for all requests
    return 444;
}
