# Mattermost Site Configuration
# Subdomain: chat.vitastrategies.com
# Team communication platform with WebSocket support

server {
    listen 80;
    server_name chat.vitastrategies.com;
    
    # Rate limiting
    limit_req zone=global burst=20 nodelay;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name chat.vitastrategies.com;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/vitastrategies.com.crt;
    ssl_certificate_key /etc/nginx/ssl/vitastrategies.com.key;
    
    # Security headers
    include /etc/nginx/security-headers.conf;
    
    # Mattermost-specific CSP
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss://chat.vitastrategies.com; media-src 'self'; object-src 'none'; frame-ancestors 'self';" always;
    
    # Rate limiting
    limit_req zone=global burst=30 nodelay;
    
    # Logging
    access_log /var/log/nginx/mattermost.access.log main;
    error_log /var/log/nginx/mattermost.error.log;
    
    # Large file uploads for team collaboration
    client_max_body_size 50M;
    
    # Proxy settings for Mattermost
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Frame-Options SAMEORIGIN;
    proxy_set_header Connection "";
    proxy_http_version 1.1;
    
    # Buffer settings for better performance
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    
    # Timeout settings
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    
    # Main application
    location / {
        proxy_pass http://mattermost_backend;
        
        # Handle Mattermost special headers
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Disable proxy buffering for real-time features
        proxy_buffering off;
    }
    
    # API endpoints with higher rate limits
    location ~ ^/api/v[0-9]+/(channels|teams|users|posts|files)/ {
        limit_req zone=api burst=100 nodelay;
        
        proxy_pass http://mattermost_backend;
        
        # API-specific headers
        proxy_set_header Accept-Encoding "";
    }
    
    # WebSocket support for real-time messaging
    location ~ /api/v[0-9]+/websocket$ {
        proxy_pass http://mattermost_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeout settings
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # Disable buffering for WebSocket
        proxy_buffering off;
    }
    
    # File uploads and downloads
    location ~ ^/api/v[0-9]+/files/ {
        proxy_pass http://mattermost_backend;
        
        # Large file handling
        proxy_request_buffering off;
        proxy_max_temp_file_size 0;
        
        # Extended timeouts for file operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # Static assets with caching
    location /static/ {
        proxy_pass http://mattermost_backend;
        
        # Cache static assets
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        
        # Compression for static files
        gzip_static on;
    }
    
    # Plugin assets
    location /plugins/ {
        proxy_pass http://mattermost_backend;
        
        # Cache plugin assets
        expires 1d;
        add_header Cache-Control "public";
    }
    
    # Health check endpoint
    location /api/v4/system/ping {
        proxy_pass http://mattermost_backend;
        access_log off;
        
        # Quick timeout for health checks
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    # Metrics endpoint (internal access only)
    location /metrics {
        proxy_pass http://mattermost_backend;
        
        # Restrict to internal networks
        allow 172.20.0.0/16;  # Docker network
        allow 127.0.0.1;      # Localhost
        deny all;
        
        access_log off;
    }
    
    # Favicon
    location = /favicon.ico {
        proxy_pass http://mattermost_backend;
        expires 1d;
        access_log off;
    }
    
    # Robots.txt
    location = /robots.txt {
        proxy_pass http://mattermost_backend;
        access_log off;
    }
    
    # Security: Block access to sensitive paths
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block common attack patterns
    location ~ /(config|backup|data)/ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
