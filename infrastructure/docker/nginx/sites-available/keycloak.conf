# Keycloak Site Configuration
# Subdomain: auth.vitastrategies.com
# Identity and Access Management with enhanced security

server {
    listen 80;
    server_name auth.vitastrategies.com;
    
    # Rate limiting
    limit_req zone=global burst=20 nodelay;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name auth.vitastrategies.com;
    
    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/vitastrategies.com.crt;
    ssl_certificate_key /etc/nginx/ssl/vitastrategies.com.key;
    
    # Security headers with relaxed CSP for Keycloak
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Strict rate limiting for authentication
    limit_req zone=login burst=5 nodelay;
    
    # Logging
    access_log /var/log/nginx/keycloak.access.log main;
    error_log /var/log/nginx/keycloak.error.log;
    
    # Keycloak settings
    client_max_body_size 10M;
    
    # Main location block
    location / {
        proxy_pass http://keycloak_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Extended timeouts for authentication flows
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Proxy buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # Admin console with extra security
    location /admin/ {
        # More restrictive rate limiting for admin
        limit_req zone=login burst=3 nodelay;
        
        # IP allowlist for admin (optional - configure as needed)
        # allow YOUR_IP_HERE;  # Replace with your IP
        # deny all;
        
        proxy_pass http://keycloak_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Authentication endpoints
    location ~ ^/(auth|realms)/ {
        limit_req zone=login burst=10 nodelay;
        
        proxy_pass http://keycloak_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # No caching for auth endpoints
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Static resources with caching
    location /resources/ {
        expires 1d;
        add_header Cache-Control "public";
        
        proxy_pass http://keycloak_backend;
        proxy_set_header Host $host;
    }
    
    # Health check
    location /health {
        proxy_pass http://keycloak_backend;
        access_log off;
    }
    
    # Security: Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
