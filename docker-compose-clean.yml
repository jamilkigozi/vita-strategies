version: '3.8'

services:
  erpnext:
    image: frappe/erpnext:latest
    ports:
      - "8000:8000"
    restart: unless-stopped

  windmill:
    image: ghcr.io/windmill-labs/windmill:main
    ports:
      - "8080:8000"
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: vita_secure_2024
    command: start-dev
    ports:
      - "8180:8080"
    restart: unless-stopped

  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    restart: unless-stopped

  appsmith:
    image: appsmith/appsmith-ee:latest
    ports:
      - "8081:80"
    restart: unless-stopped

  mattermost:
    image: mattermost/mattermost-enterprise-edition:latest
    ports:
      - "8065:8065"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: vita_secure_2024
    ports:
      - "3001:3000"
    restart: unless-stopped
