events {
    worker_connections 1024;
}

http {
    # WordPress
    server {
        listen 80;
        listen 443 ssl;
        server_name vitastrategies.com www.vitastrategies.com;
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        location / {
            proxy_pass http://wordpress-dns:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Mattermost
    server {
        listen 80;
        listen 443 ssl;
        server_name chat.vitastrategies.com;
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        location / {
            proxy_pass http://mattermost-dns:8065;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Keycloak
    server {
        listen 80;
        listen 443 ssl;
        server_name auth.vitastrategies.com;
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        location / {
            proxy_pass http://keycloak:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # Default
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        ssl_certificate /etc/nginx/ssl/nginx.crt;
        ssl_certificate_key /etc/nginx/ssl/nginx.key;
        return 200 "Vita Strategies Platform - All Services Running";
        add_header Content-Type text/plain;
    }
}