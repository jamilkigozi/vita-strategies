events {
    worker_connections 1024;
}

http {
    upstream erpnext {
        server erpnext-frontend:8080;
    }
    
    upstream windmill {
        server windmill:8000;
    }
    
    upstream keycloak {
        server keycloak:8080;
    }
    
    upstream metabase {
        server metabase:3000;
    }
    
    upstream appsmith {
        server appsmith:80;
    }
    
    upstream mattermost {
        server mattermost:8065;
    }
    
    upstream grafana {
        server grafana:3000;
    }

    # ERPNext
    server {
        listen 80;
        server_name erp.vitastrategies.com;
        
        location / {
            proxy_pass http://erpnext;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Windmill
    server {
        listen 80;
        server_name workflows.vitastrategies.com;
        
        location / {
            proxy_pass http://windmill;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Keycloak
    server {
        listen 80;
        server_name auth.vitastrategies.com;
        
        location / {
            proxy_pass http://keycloak;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Metabase
    server {
        listen 80;
        server_name analytics.vitastrategies.com;
        
        location / {
            proxy_pass http://metabase;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Appsmith
    server {
        listen 80;
        server_name apps.vitastrategies.com;
        
        location / {
            proxy_pass http://appsmith;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Mattermost
    server {
        listen 80;
        server_name chat.vitastrategies.com;
        
        location / {
            proxy_pass http://mattermost;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Grafana
    server {
        listen 80;
        server_name monitoring.vitastrategies.com;
        
        location / {
            proxy_pass http://grafana;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
