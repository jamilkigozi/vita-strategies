version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: vita-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - erpnext-frontend
      - windmill
      - keycloak
      - metabase
      - appsmith
      - grafana
    restart: unless-stopped
    networks:
      - vita-network

  # ERPNext Backend
  erpnext-backend:
    image: frappe/erpnext:v15.latest
    container_name: vita-erpnext-backend
    environment:
      - DB_HOST=${MYSQL_HOST}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_CACHE=redis://redis:6379/0
      - REDIS_QUEUE=redis://redis:6379/1
      - SOCKETIO_PORT=9000
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - vita-network

  # ERPNext Frontend
  erpnext-frontend:
    image: frappe/erpnext:v15.latest
    container_name: vita-erpnext-frontend
    command: ["nginx", "-g", "daemon off;"]
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
    depends_on:
      - erpnext-backend
    restart: unless-stopped
    networks:
      - vita-network

  # ERPNext Queue Workers
  erpnext-queue-long:
    image: frappe/erpnext:v15.latest
    container_name: vita-erpnext-queue-long
    command: ["bench", "worker", "--queue", "long"]
    environment:
      - DB_HOST=${MYSQL_HOST}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_CACHE=redis://redis:6379/0
      - REDIS_QUEUE=redis://redis:6379/1
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    depends_on:
      - redis
      - erpnext-backend
    restart: unless-stopped
    networks:
      - vita-network

  erpnext-queue-short:
    image: frappe/erpnext:v15.latest
    container_name: vita-erpnext-queue-short
    command: ["bench", "worker", "--queue", "short"]
    environment:
      - DB_HOST=${MYSQL_HOST}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_CACHE=redis://redis:6379/0
      - REDIS_QUEUE=redis://redis:6379/1
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    depends_on:
      - redis
      - erpnext-backend
    restart: unless-stopped
    networks:
      - vita-network

  # ERPNext Scheduler
  erpnext-scheduler:
    image: frappe/erpnext:v15.latest
    container_name: vita-erpnext-scheduler
    command: ["bench", "schedule"]
    environment:
      - DB_HOST=${MYSQL_HOST}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_CACHE=redis://redis:6379/0
      - REDIS_QUEUE=redis://redis:6379/1
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
      - erpnext_logs:/home/frappe/frappe-bench/logs
    depends_on:
      - redis
      - erpnext-backend
    restart: unless-stopped
    networks:
      - vita-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: vita-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - vita-network

  # Windmill
  windmill:
    image: ghcr.io/windmill-labs/windmill:main
    container_name: vita-windmill
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/windmill
      - RUST_LOG=info
    restart: unless-stopped
    networks:
      - vita-network

  # Keycloak
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: vita-keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://${POSTGRES_HOST}:5432/keycloak
      - KC_DB_USERNAME=${POSTGRES_USER}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
      - KC_HOSTNAME=${DOMAIN_NAME}
    command: start --optimized
    restart: unless-stopped
    networks:
      - vita-network

  # Metabase
  metabase:
    image: metabase/metabase:latest
    container_name: vita-metabase
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=metabase
      - MB_DB_PORT=5432
      - MB_DB_USER=${POSTGRES_USER}
      - MB_DB_PASS=${POSTGRES_PASSWORD}
      - MB_DB_HOST=${POSTGRES_HOST}
    volumes:
      - metabase_data:/metabase-data
    restart: unless-stopped
    networks:
      - vita-network

  # Appsmith
  appsmith:
    image: appsmith/appsmith-ce:latest
    container_name: vita-appsmith
    environment:
      - APPSMITH_ENCRYPTION_PASSWORD=${APPSMITH_ENCRYPTION_PASSWORD}
      - APPSMITH_ENCRYPTION_SALT=${APPSMITH_ENCRYPTION_SALT}
      - APPSMITH_MONGODB_URI=mongodb://mongo:27017/appsmith
    volumes:
      - appsmith_data:/appsmith-stacks
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - vita-network

  # MongoDB for Appsmith
  mongo:
    image: mongo:6
    container_name: vita-mongo
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - vita-network

  # Mattermost
  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: vita-mattermost
    environment:
      - MM_SQLSETTINGS_DRIVERNAME=postgres
      - MM_SQLSETTINGS_DATASOURCE=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/mattermost?sslmode=disable&connect_timeout=10
    volumes:
      - mattermost_data:/mattermost/data
      - mattermost_config:/mattermost/config
    restart: unless-stopped
    networks:
      - vita-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: vita-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=${POSTGRES_HOST}:5432
      - GF_DATABASE_NAME=grafana
      - GF_DATABASE_USER=${POSTGRES_USER}
      - GF_DATABASE_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - vita-network

volumes:
  erpnext_sites:
  erpnext_logs:
  redis_data:
  metabase_data:
  appsmith_data:
  mongo_data:
  mattermost_data:
  mattermost_config:
  grafana_data:

networks:
  vita-network:
    driver: bridge
