# Cloud Build Configuration
# Purpose: Automated CI/CD pipeline for all microservices
# Trigger: Push to main branch

steps:
  # Build WordPress
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/wordpress:latest', './apps/wordpress']
    id: 'build-wordpress'

  # Build ERPNext
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/erpnext:latest', './apps/erpnext']
    id: 'build-erpnext'

  # Build Mattermost
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/mattermost:latest', './apps/mattermost']
    id: 'build-mattermost'

  # Build Windmill
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/windmill:latest', './apps/windmill']
    id: 'build-windmill'

  # Build Metabase
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/metabase:latest', './apps/metabase']
    id: 'build-metabase'

  # Build Grafana
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/grafana:latest', './apps/grafana']
    id: 'build-grafana'

  # Build Keycloak
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/keycloak:latest', './apps/keycloak']
    id: 'build-keycloak'

  # Build OpenBao
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/openbao:latest', './apps/openbao']
    id: 'build-openbao'

  # Build Appsmith
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/appsmith:latest', './apps/appsmith']
    id: 'build-appsmith'

  # Push all images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/wordpress:latest']
    waitFor: ['build-wordpress']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/erpnext:latest']
    waitFor: ['build-erpnext']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/mattermost:latest']
    waitFor: ['build-mattermost']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/windmill:latest']
    waitFor: ['build-windmill']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/metabase:latest']
    waitFor: ['build-metabase']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/grafana:latest']
    waitFor: ['build-grafana']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/keycloak:latest']
    waitFor: ['build-keycloak']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/openbao:latest']
    waitFor: ['build-openbao']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/appsmith:latest']
    waitFor: ['build-appsmith']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'vita-strategies-wordpress',
      '--image', 'gcr.io/$PROJECT_ID/wordpress:latest',
      '--region', 'europe-west2',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'vita-strategies-erpnext',
      '--image', 'gcr.io/$PROJECT_ID/erpnext:latest',
      '--region', 'europe-west2',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'vita-strategies-mattermost',
      '--image', 'gcr.io/$PROJECT_ID/mattermost:latest',
      '--region', 'europe-west2',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'vita-strategies-windmill',
      '--image', 'gcr.io/$PROJECT_ID/windmill:latest',
      '--region', 'europe-west2',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'vita-strategies-metabase',
      '--image', 'gcr.io/$PROJECT_ID/metabase:latest',
      '--region', 'europe-west2',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'vita-strategies-grafana',
      '--image', 'gcr.io/$PROJECT_ID/grafana:latest',
      '--region', 'europe-west2',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'vita-strategies-keycloak',
      '--image', 'gcr.io/$PROJECT_ID/keycloak:latest',
      '--region', 'europe-west2',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'vita-strategies-openbao',
      '--image', 'gcr.io/$PROJECT_ID/openbao:latest',
      '--region', 'europe-west2',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

  - name: 'gcr.io/cloud-builders/gcloud'
    args: [
      'run', 'deploy', 'vita-strategies-appsmith',
      '--image', 'gcr.io/$PROJECT_ID/appsmith:latest',
      '--region', 'europe-west2',
      '--platform', 'managed',
      '--allow-unauthenticated'
    ]

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'