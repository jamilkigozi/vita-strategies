events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log;

    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Main domain redirect to ERPNext
    server {
        listen 80;
        listen 443 ssl http2;
        server_name vitastrategies.com www.vitastrategies.com;

        ssl_certificate /etc/nginx/ssl/vitastrategies.com.crt;
        ssl_certificate_key /etc/nginx/ssl/vitastrategies.com.key;

        # Redirect HTTP to HTTPS
        if ($scheme != "https") {
            return 301 https://$host$request_uri;
        }

        # Redirect to ERPNext
        return 301 https://erp.vitastrategies.com$request_uri;
    }

    # ERPNext
    server {
        listen 80;
        listen 443 ssl http2;
        server_name erp.vitastrategies.com;

        ssl_certificate /etc/nginx/ssl/vitastrategies.com.crt;
        ssl_certificate_key /etc/nginx/ssl/vitastrategies.com.key;

        if ($scheme != "https") {
            return 301 https://$host$request_uri;
        }

        location / {
            proxy_pass http://erpnext:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }

    # Windmill
