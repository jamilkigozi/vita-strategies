services:
  # Database for ERPNext
  erpnext-db:
    image: mariadb:10.6
    environment:
      MYSQL_ROOT_PASSWORD: vita_secure_2024
      MYSQL_DATABASE: erpnext
      MYSQL_USER: erpnext
      MYSQL_PASSWORD: vita_secure_2024
    volumes:
      - erpnext_db_data:/var/lib/mysql
    restart: unless-stopped

  # Redis for ERPNext queues
  erpnext-redis-queue:
    image: redis:6-alpine
    ports:
      - "11311:6379"
    volumes:
      - erpnext_redis_queue_data:/data
    restart: unless-stopped

  # Redis for ERPNext cache
  erpnext-redis-cache:
    image: redis:6-alpine
    ports:
      - "13311:6379"
    volumes:
      - erpnext_redis_cache_data:/data
    restart: unless-stopped

  # ERPNext - Business Management
  erpnext:
    image: frappe/erpnext:latest
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=erpnext-db
      - DB_ROOT_PASSWORD=vita_secure_2024
      - REDIS_QUEUE=redis://erpnext-redis-queue:6379
      - REDIS_CACHE=redis://erpnext-redis-cache:6379
    volumes:
      - erpnext_sites:/home/frappe/frappe-bench/sites
    depends_on:
      - erpnext-db
      - erpnext-redis-queue
      - erpnext-redis-cache
    restart: unless-stopped

  # PostgreSQL for Metabase, Keycloak, etc.
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: VitaStrategies2024!PostgreSQL
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Windmill - Workflow Automation
  windmill:
    image: ghcr.io/windmill-labs/windmill:main
    ports:
      - "8080:8000"
    environment:
      - DATABASE_URL=postgres://postgres:VitaStrategies2024!PostgreSQL@postgres:5432/postgres
    volumes:
      - windmill_data:/app/data
    depends_on:
      - postgres
    restart: unless-stopped

  # Keycloak - Authentication (with persistent database)
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: WQoMn2/jMqTXcH/b93Me1MRw7fEXnrfkGfwwfrwV5gI=
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/postgres
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: VitaStrategies2024!PostgreSQL
    command: start-dev
    ports:
      - "8180:8080"
    depends_on:
      - postgres
    restart: unless-stopped

  # Metabase - Analytics (with persistent database)
  metabase:
    image: metabase/metabase:latest
    ports:
      - "3000:3000"
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_DBNAME=postgres
      - MB_DB_PORT=5432
      - MB_DB_USER=postgres
      - MB_DB_PASS=VitaStrategies2024!PostgreSQL
      - MB_DB_HOST=postgres
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - postgres
    restart: unless-stopped

  # Appsmith - App Builder (with persistent data)
  appsmith:
    image: appsmith/appsmith-ee:latest
    ports:
      - "8081:80"
    environment:
      - APPSMITH_ENCRYPTION_PASSWORD=zxfzAfzpRPSwq1hnjPrsrIzV18Zpv8DhpCAGqBKy0gc=
      - APPSMITH_ENCRYPTION_SALT=vita-strategies-salt-2024
    volumes:
      - appsmith_data:/appsmith-stacks
    restart: unless-stopped

  # Mattermost - Team Communication (with persistent database)
  mattermost:
    image: mattermost/mattermost-enterprise-edition:latest
    ports:
      - "8065:8065"
    environment:
      - MM_SQLSETTINGS_DRIVERNAME=postgres
      - MM_SQLSETTINGS_DATASOURCE=postgres://postgres:VitaStrategies2024!PostgreSQL@postgres:5432/postgres?sslmode=disable
      - MM_SERVICESETTINGS_SITEURL=https://chat.vitastrategies.com
    volumes:
      - mattermost_data:/mattermost/data
      - mattermost_logs:/mattermost/logs
      - mattermost_config:/mattermost/config
    depends_on:
      - postgres
    restart: unless-stopped

  # Grafana - Monitoring (with persistent data)
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: VitaStrategies2024!Grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_config:/etc/grafana
    restart: unless-stopped

volumes:
  # ERPNext Data
  erpnext_sites:
  erpnext_db_data:
  erpnext_redis_queue_data:
  erpnext_redis_cache_data:
  
  # PostgreSQL Data
  postgres_data:
  
  # Service Data
  metabase_data:
  appsmith_data:
  mattermost_data:
  mattermost_logs:
  mattermost_config:
  grafana_data:
  grafana_config:
  windmill_data:
