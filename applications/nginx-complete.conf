# Vita Strategies - Complete Nginx Configuration
# Handles all 8 business platform services

upstream erpnext_backend {
    server localhost:8000;
}

upstream windmill_backend {
    server localhost:8080;
}

upstream keycloak_backend {
    server localhost:8180;
}

upstream metabase_backend {
    server localhost:3000;
}

upstream appsmith_backend {
    server localhost:8081;
}

upstream mattermost_backend {
    server localhost:8065;
}

upstream grafana_backend {
    server localhost:3001;
}

upstream openbao_backend {
    server localhost:8200;
}

# ERPNext - Business Management
server {
    listen 80;
    server_name erp.vitastrategies.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name erp.vitastrategies.com;

    location / {
        proxy_pass http://erpnext_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}

