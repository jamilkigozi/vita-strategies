# Logrotate configuration for Metabase Business Intelligence Platform
# File: logrotate.conf
# Purpose: Manage log rotation for Metabase application and access logs

# Metabase application logs
/var/log/metabase/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 metabase metabase
    
    # Post-rotation actions
    postrotate
        # Send HUP signal to Metabase to reopen log files
        if [ -f /var/run/metabase.pid ]; then
            kill -HUP $(cat /var/run/metabase.pid) 2>/dev/null || true
        fi
        
        # Alternatively, restart the container if needed
        # docker restart metabase-server 2>/dev/null || true
    endscript
    
    # Pre-rotation actions
    prerotate
        # Create log directory if it doesn't exist
        if [ ! -d /var/log/metabase ]; then
            mkdir -p /var/log/metabase
            chown metabase:metabase /var/log/metabase
        fi
    endscript
}

# Nginx access logs for Metabase
/var/log/nginx/metabase_access.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 nginx nginx
    sharedscripts
    
    postrotate
        # Reload nginx to reopen log files
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}

# Nginx error logs for Metabase
/var/log/nginx/metabase_error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 nginx nginx
    sharedscripts
    
    postrotate
        # Reload nginx to reopen log files
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}

# PostgreSQL logs (if local)
/var/log/postgresql/metabase-postgresql*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 postgres postgres
    
    postrotate
        # Reload PostgreSQL to reopen log files
        if [ -f /var/run/postgresql/postgresql.pid ]; then
            kill -HUP $(cat /var/run/postgresql/postgresql.pid) 2>/dev/null || true
        fi
    endscript
}

# Docker container logs (if using Docker logging)
/var/lib/docker/containers/*/*-json.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    
    # Only rotate logs for Metabase containers
    prerotate
        CONTAINER_NAME=$(basename $(dirname $1))
        CONTAINER_INFO=$(docker inspect $CONTAINER_NAME 2>/dev/null | jq -r '.[0].Config.Labels["service.name"]' 2>/dev/null)
        if [ "$CONTAINER_INFO" != "metabase" ]; then
            exit 1
        fi
    endscript
}

# Metabase query logs (if enabled)
/var/log/metabase/queries/*.log {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0644 metabase metabase
    
    # Keep query logs longer for analytics
    maxage 90
    
    postrotate
        # Clean up old query logs
        find /var/log/metabase/queries -name "*.log.*.gz" -mtime +90 -delete 2>/dev/null || true
    endscript
}

# Metabase audit logs (if enabled)
/var/log/metabase/audit/*.log {
    daily
    rotate 365
    compress
    delaycompress
    missingok
    notifempty
    create 0644 metabase metabase
    
    # Keep audit logs for compliance (1 year)
    maxage 365
    
    postrotate
        # Ensure audit log integrity
        chmod 0400 /var/log/metabase/audit/*.log.*.gz 2>/dev/null || true
    endscript
}

