# Metabase Business Intelligence Platform Configuration
# File: metabase.conf
# Purpose: Advanced configuration settings for production deployment

[application]
# Application identification
name = "Vita Strategies Analytics"
description = "Business Intelligence and Data Analytics Platform"
version = "0.47.7"
environment = "production"

# Server configuration
port = 3000
host = "0.0.0.0"
timezone = "UTC"
locale = "en"

# Database connection settings
[database]
type = "postgres"
host = "postgres"
port = 5432
database = "metabase"
username = "metabase_user"
# Password set via environment variable
connection_pool_min = 5
connection_pool_max = 20
connection_timeout = 30
query_timeout = 300

# Security configuration
[security]
encryption_key_source = "environment"
session_timeout = 1440  # 24 hours in minutes
password_complexity = true
password_length_min = 12
account_lockout_threshold = 5
account_lockout_duration = 30  # minutes

# SSL/TLS settings
ssl_enabled = true
ssl_redirect = true
force_https = true

# Content Security Policy
csp_enabled = true
csp_report_only = false

[authentication]
# Local authentication
local_auth_enabled = true
allow_new_user_registration = false

# SAML configuration
saml_enabled = true
saml_application_name = "Metabase Analytics"
saml_attribute_email = "email"
saml_attribute_first_name = "firstName"
saml_attribute_last_name = "lastName"
saml_group_sync = true
saml_group_attribute = "groups"

# LDAP configuration (alternative to SAML)
ldap_enabled = false
ldap_group_sync = false

[email]
# SMTP configuration
smtp_enabled = true
smtp_security = "tls"
smtp_port = 587
# Host, username, password set via environment variables

# Email templates
from_name = "Vita Strategies Analytics"
reply_to_enabled = true

[caching]
# Redis configuration for caching
cache_backend = "redis"
redis_host = "redis"
redis_port = 6379
redis_db = 0
redis_timeout = 5000

# Cache settings
cache_ttl_default = 3600  # 1 hour
cache_ttl_dashboard = 1800  # 30 minutes
cache_ttl_question = 3600  # 1 hour

[performance]
# Java heap settings
heap_size_min = "1g"
heap_size_max = "3g"

# Garbage collection
gc_algorithm = "G1GC"
gc_max_pause = 200

# Thread pools
http_thread_pool_size = 50
async_thread_pool_size = 10

# Query execution
max_concurrent_queries = 20
query_timeout_default = 120  # seconds
query_timeout_max = 300  # seconds

[logging]
# Log levels
level_root = "INFO"
level_metabase = "INFO"
level_sql = "WARN"
level_security = "INFO"

# Log formats
format = "json"
timestamp_format = "ISO8601"

# Log rotation
rotation_enabled = true
rotation_size = "100MB"
rotation_count = 10

# Specific loggers
[logging.loggers]
"metabase.query-processor" = "INFO"
"metabase.middleware" = "WARN"
"metabase.api" = "INFO"
"metabase.driver" = "INFO"

[monitoring]
# Health checks
health_check_enabled = true
health_check_interval = 30  # seconds

# Metrics collection
metrics_enabled = true
metrics_endpoint = "/api/health"

# JMX monitoring
jmx_enabled = true
jmx_port = 9999

[data_sources]
# Default connection settings
default_connection_timeout = 30
default_query_timeout = 120
default_ssl_enabled = true

# Connection pooling
default_pool_min = 2
default_pool_max = 10

[dashboards]
# Dashboard settings
auto_refresh_enabled = true
auto_refresh_default = 60  # seconds
auto_refresh_max = 300  # seconds

# Embedding
embedding_enabled = true
embedding_secret_key_source = "environment"

[questions]
# Query settings
public_sharing_enabled = false
query_caching_enabled = true
query_caching_default_ttl = 3600

[alerts]
# Alert configuration
alerts_enabled = true
alert_frequency_min = 300  # 5 minutes
alert_max_per_user = 100

[api]
# API configuration
rate_limiting_enabled = true
rate_limit_requests_per_minute = 1000
api_key_enabled = true

# Webhook settings
webhooks_enabled = true
webhook_timeout = 30

[backup]
# Backup configuration
backup_enabled = true
backup_schedule = "0 2 * * *"  # Daily at 2 AM
backup_retention_days = 30
backup_location = "/opt/metabase/backups"

[compliance]
# Audit logging
audit_logging_enabled = true
audit_log_location = "/var/log/metabase/audit"

# Data retention
data_retention_enabled = true
data_retention_days = 2555  # 7 years

# Privacy settings
anonymous_tracking_enabled = false
usage_analytics_enabled = false

[plugins]
# Plugin management
plugin_directory = "/opt/metabase/plugins"
plugin_auto_update = false

# Database drivers
driver_auto_download = false

[clustering]
# Clustering support (for enterprise)
clustering_enabled = false
cluster_name = "vita-strategies-metabase"

[advanced]
# Advanced settings
check_for_updates = false
site_locale_auto_detect = true
humanization_strategy = "simple"

# Feature flags
enable_xrays = true
enable_nested_queries = true
enable_query_caching = true

# Experimental features
experimental_features_enabled = false
