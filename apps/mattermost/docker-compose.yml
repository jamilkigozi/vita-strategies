version: '3.8'

# Mattermost Team Communication Platform
# Standalone deployment configuration for development and testing

services:
  mattermost:
    build: .
    container_name: vita-mattermost-standalone
    environment:
      # Database Configuration
      MM_SQLSETTINGS_DRIVERNAME: postgres
      MM_SQLSETTINGS_DATASOURCE: postgres://mattermost:${MATTERMOST_DB_PASSWORD}@${POSTGRES_HOST:-postgres}:5432/mattermost?sslmode=disable&connect_timeout=10
      
      # Service Configuration
      MM_SERVICESETTINGS_SITEURL: https://chat.vitastrategies.com
      MM_SERVICESETTINGS_WEBSOCKETURL: wss://chat.vitastrategies.com
      MM_SERVICESETTINGS_LISTENADDRESS: :8065
      MM_SERVICESETTINGS_ENABLEINSECUREOUTGOINGCONNECTIONS: false
      
      # Email Configuration (optional)
      MM_EMAILSETTINGS_SMTPSERVER: ${SMTP_SERVER:-}
      MM_EMAILSETTINGS_SMTPPORT: ${SMTP_PORT:-587}
      MM_EMAILSETTINGS_SMTPUSERNAME: ${SMTP_USERNAME:-}
      MM_EMAILSETTINGS_SMTPPASSWORD: ${SMTP_PASSWORD:-}
      
      # Admin User (optional - for initial setup)
      MM_ADMIN_USERNAME: ${MATTERMOST_ADMIN_USERNAME:-admin}
      MM_ADMIN_PASSWORD: ${MATTERMOST_ADMIN_PASSWORD}
      MM_ADMIN_EMAIL: ${MATTERMOST_ADMIN_EMAIL:-admin@vitastrategies.com}
      
      # Plugin Configuration
      ENABLE_JITSI_PLUGIN: true
      ENABLE_EXPORT_PLUGIN: true
      
    ports:
      - "8065:8065"
      - "8067:8067"  # Metrics port
      
    volumes:
      # Persistent data storage
      - mattermost_data:/mattermost/data
      - mattermost_logs:/var/log/mattermost
      - mattermost_plugins:/mattermost/plugins
      
      # Configuration
      - ./config:/mattermost/config:ro
      
      # Cloud Storage mount (production)
      - /mnt/buckets/mattermost:/mattermost/cloud-storage:rw
      
    networks:
      - mattermost_network
      
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    depends_on:
      - postgres
    
    security_opt:
      - no-new-privileges:true
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'

  # PostgreSQL database for development/testing
  postgres:
    image: postgres:15-alpine
    container_name: mattermost-postgres
    environment:
      POSTGRES_DB: mattermost
      POSTGRES_USER: mattermost
      POSTGRES_PASSWORD: ${MATTERMOST_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
    networks:
      - mattermost_network
      
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mattermost"]
      interval: 30s
      timeout: 10s
      retries: 3
    
    security_opt:
      - no-new-privileges:true

volumes:
  mattermost_data:
    driver: local
  mattermost_logs:
    driver: local
  mattermost_plugins:
    driver: local
  postgres_data:
    driver: local

networks:
  mattermost_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
