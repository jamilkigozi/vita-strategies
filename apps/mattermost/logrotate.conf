# Mattermost Log Rotation Configuration
# Manages log file rotation to prevent disk space issues

/var/log/mattermost/*.log {
    daily
    missingok
    rotate 30
    compress
    notifempty
    create 644 mattermost mattermost
    sharedscripts
    postrotate
        # Send USR1 signal to Mattermost to reopen log files
        if [ -f /var/run/mattermost.pid ]; then
            kill -USR1 `cat /var/run/mattermost.pid` 2>/dev/null || true
        fi
    endscript
}
