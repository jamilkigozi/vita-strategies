# Log rotation configuration for OpenBao
# Manages log files to prevent disk space issues

# OpenBao main log file
/var/log/openbao/openbao.log {
    # Rotation frequency and retention
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 openbao openbao
    
    # Size-based rotation as backup
    size 100M
    maxage 90
    
    # Post-rotation script
    postrotate
        # Send SIGHUP to OpenBao to reopen log files
        if [ -f /opt/openbao/data/openbao.pid ]; then
            kill -HUP $(cat /opt/openbao/data/openbao.pid) 2>/dev/null || true
        fi
        
        # Restart rsyslog if it's running
        if systemctl is-active --quiet rsyslog; then
            systemctl reload rsyslog
        fi
    endscript
    
    # Compression options
    compresscmd /bin/gzip
    compressext .gz
    compressoptions "-9"
}

# OpenBao audit log file
/opt/openbao/audit/audit.log {
    # More frequent rotation for audit logs
    daily
    rotate 365  # Keep audit logs for 1 year
    compress
    delaycompress
    missingok
    notifempty
    create 0600 openbao openbao  # Stricter permissions for audit logs
    
    # Size-based rotation
    size 50M
    maxage 365
    
    # Archive audit logs to secure location
    postrotate
        # Copy rotated audit logs to secure backup location
        if [ -f /opt/openbao/audit/audit.log.1 ]; then
            cp /opt/openbao/audit/audit.log.1 /opt/openbao/backup/audit/audit-$(date +%Y%m%d-%H%M%S).log.gz 2>/dev/null || true
        fi
        
        # Send notification to syslog about audit log rotation
        logger -t openbao-logrotate "OpenBao audit log rotated: $(date)"
        
        # Send SIGHUP to OpenBao for audit log file
        if [ -f /opt/openbao/data/openbao.pid ]; then
            kill -HUP $(cat /opt/openbao/data/openbao.pid) 2>/dev/null || true
        fi
    endscript
    
    # Compression settings
    compresscmd /bin/gzip
    compressext .gz
    compressoptions "-9"
}

# OpenBao container logs (if using file logging driver)
/var/log/containers/openbao-*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    size 50M
    maxage 30
    
    # Clean up old container logs
    postrotate
        # Remove old container logs beyond retention period
        find /var/log/containers/ -name "openbao-*.log.*" -mtime +30 -delete 2>/dev/null || true
    endscript
}

# Database logs (PostgreSQL)
/var/log/postgresql/postgresql-*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 postgres postgres
    size 100M
    maxage 60
    
    postrotate
        # Reload PostgreSQL to reopen log files
        if systemctl is-active --quiet postgresql; then
            systemctl reload postgresql
        fi
    endscript
}

# Nginx access logs for OpenBao
/var/log/nginx/openbao.access.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 www-data www-data
    size 100M
    maxage 90
    
    postrotate
        # Reload Nginx to reopen log files
        if systemctl is-active --quiet nginx; then
            systemctl reload nginx
        fi
        
        # Process access logs for security analysis
        if [ -f /opt/openbao/scripts/analyze-access-logs.sh ]; then
            /opt/openbao/scripts/analyze-access-logs.sh /var/log/nginx/openbao.access.log.1 &
        fi
    endscript
    
    # Shared options for web logs
    sharedscripts
}

# Nginx error logs for OpenBao
/var/log/nginx/openbao.error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 www-data www-data
    size 50M
    maxage 90
    
    postrotate
        # Reload Nginx
        if systemctl is-active --quiet nginx; then
            systemctl reload nginx
        fi
        
        # Alert on error log rotation (indicates errors occurred)
        if [ -f /var/log/nginx/openbao.error.log.1 ]; then
            logger -t openbao-security "OpenBao Nginx error log rotated - check for issues"
        fi
    endscript
    
    sharedscripts
}

# System logs related to OpenBao
/var/log/syslog {
    # Extract OpenBao-related entries
    lastaction
        # Extract OpenBao entries from syslog
        grep -i "openbao\|vault" /var/log/syslog.1 > /var/log/openbao/system.log 2>/dev/null || true
        
        # Compress the extracted log
        gzip /var/log/openbao/system.log 2>/dev/null || true
    endlastaction
}

# Application-specific logs
/opt/openbao/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 openbao openbao
    size 50M
    maxage 30
    
    # Wildcard support
    sharedscripts
    
    postrotate
        # Clean up application logs
        find /opt/openbao/logs/ -name "*.log.*" -mtime +30 -delete 2>/dev/null || true
        
        # Send log rotation notification
        logger -t openbao-logrotate "OpenBao application logs rotated"
    endscript
}

# Backup operation logs
/opt/openbao/backup/*.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 0600 openbao openbao
    size 10M
    maxage 60
    
    postrotate
        # Archive backup logs
        if [ -d /opt/openbao/backup/logs ]; then
            mv /opt/openbao/backup/*.log.*.gz /opt/openbao/backup/logs/ 2>/dev/null || true
        fi
    endscript
}

# Security logs (custom application logs)
/var/log/openbao/security.log {
    daily
    rotate 365  # Keep security logs for 1 year
    compress
    delaycompress
    missingok
    notifempty
    create 0600 openbao openbao  # Strict permissions
    size 100M
    maxage 365
    
    postrotate
        # Archive security logs securely
        if [ -f /var/log/openbao/security.log.1 ]; then
            # Copy to secure archive location
            cp /var/log/openbao/security.log.1 /opt/openbao/backup/security/security-$(date +%Y%m%d-%H%M%S).log 2>/dev/null || true
            
            # Send alert about security log rotation
            logger -t openbao-security "OpenBao security log rotated and archived"
        fi
    endscript
}

# Performance monitoring logs
/var/log/openbao/performance.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 openbao openbao
    size 50M
    maxage 60
    
    postrotate
        # Process performance metrics
        if [ -f /opt/openbao/scripts/process-performance-logs.sh ]; then
            /opt/openbao/scripts/process-performance-logs.sh /var/log/openbao/performance.log.1 &
        fi
    endscript
}
