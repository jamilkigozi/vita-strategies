# OpenBao Nginx Configuration
# Reverse proxy configuration for secrets management platform

upstream openbao_backend {
    # Multiple OpenBao instances for high availability
    server openbao-1:8200 max_fails=3 fail_timeout=30s weight=1;
    server openbao-2:8200 max_fails=3 fail_timeout=30s weight=1 backup;
    server openbao-3:8200 max_fails=3 fail_timeout=30s weight=1 backup;
    
    # Health check configuration
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=openbao_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=openbao_api:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=openbao_ui:10m rate=30r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=openbao_conn:10m;

# Main server block for OpenBao
server {
    listen 80;
    listen [::]:80;
    server_name vault.vitastrategies.com;
    
    # Security headers
    include /etc/nginx/snippets/security-headers.conf;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vault.vitastrategies.com;
    
    # SSL configuration
    ssl_certificate /etc/ssl/certs/vault.vitastrategies.com.crt;
    ssl_certificate_key /etc/ssl/private/vault.vitastrategies.com.key;
    ssl_trusted_certificate /etc/ssl/certs/ca-bundle.crt;
    
    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Security headers specific to OpenBao
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-OpenBao-Cluster "vita-strategies" always;
    
    # Remove server tokens
    server_tokens off;
    
    # Request size limits
    client_max_body_size 1M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    
    # Timeout configurations
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 15;
    send_timeout 10;
    
    # Rate limiting
    limit_req_status 429;
    limit_conn_status 429;
    limit_conn openbao_conn 10;
    
    # Logging configuration
    access_log /var/log/nginx/openbao.access.log main buffer=16k flush=5m;
    error_log /var/log/nginx/openbao.error.log warn;
    
    # Main OpenBao API and UI location
    location / {
        # Rate limiting for general API access
        limit_req zone=openbao_api burst=20 nodelay;
        
        # Proxy settings
        proxy_pass http://openbao_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Proxy timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Proxy buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # Cache settings for static content
        proxy_cache_bypass $http_upgrade;
        proxy_cache_valid 200 302 10m;
        proxy_cache_valid 404 1m;
        
        # No caching for API endpoints
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # Authentication endpoints with stricter rate limiting
    location ~ ^/v1/auth/ {
        limit_req zone=openbao_login burst=3 nodelay;
        limit_req zone=openbao_api burst=10 nodelay;
        
        # Proxy settings
        proxy_pass http://openbao_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Extended timeouts for authentication
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # No caching for auth endpoints
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # UI-specific location with appropriate rate limiting
    location /ui/ {
        limit_req zone=openbao_ui burst=10 nodelay;
        
        # Proxy settings
        proxy_pass http://openbao_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # UI-specific headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # Cache static UI assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }
    }
    
    # Health check endpoint (no rate limiting)
    location /v1/sys/health {
        # Allow health checks without authentication
        proxy_pass http://openbao_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Quick timeouts for health checks
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        
        # Cache health check responses briefly
        add_header Cache-Control "public, max-age=30";
        
        # Allow access for monitoring systems
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
    }
    
    # Metrics endpoint for monitoring
    location /v1/sys/metrics {
        # Restrict access to monitoring systems
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        
        proxy_pass http://openbao_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # No caching for metrics
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    
    # Block access to sensitive paths
    location ~ ^/v1/sys/(raw|replication|storage) {
        deny all;
        return 403;
    }
    
    # Block access to internal cluster communication
    location /v1/sys/storage/raft {
        deny all;
        return 403;
    }
    
    # Security.txt for security researchers
    location /.well-known/security.txt {
        return 200 "Contact: security@vitastrategies.com\nExpires: 2024-12-31T23:59:59.000Z\nPreferred-Languages: en\nCanonical: https://vault.vitastrategies.com/.well-known/security.txt";
        add_header Content-Type text/plain;
    }
    
    # Deny access to hidden files and directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to backup and config files
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# Health check server for load balancer
server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    
    # Simple health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Nginx status for monitoring
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
    
    # Deny all other requests
    location / {
        deny all;
        return 404;
    }
}
