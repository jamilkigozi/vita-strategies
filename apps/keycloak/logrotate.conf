# Log rotation configuration for Keycloak
# Manages log files to prevent disk space issues

# Keycloak main log file
/var/log/keycloak/keycloak.log {
    # Rotation frequency and retention
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 keycloak keycloak
    
    # Size-based rotation as backup
    size 100M
    maxage 90
    
    # Post-rotation script
    postrotate
        # Send SIGHUP to Keycloak to reopen log files (if supported)
        if [ -f /opt/keycloak/data/keycloak.pid ]; then
            kill -HUP $(cat /opt/keycloak/data/keycloak.pid) 2>/dev/null || true
        fi
        
        # Restart rsyslog if it's running
        if systemctl is-active --quiet rsyslog; then
            systemctl reload rsyslog
        fi
        
        # Notify of log rotation
        logger -t keycloak-logrotate "Keycloak main log rotated: $(date)"
    endscript
    
    # Compression options
    compresscmd /bin/gzip
    compressext .gz
    compressoptions "-9"
}

# Keycloak container logs (if using file logging driver)
/var/log/containers/keycloak-*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    size 50M
    maxage 30
    
    # Clean up old container logs
    postrotate
        # Remove old container logs beyond retention period
        find /var/log/containers/ -name "keycloak-*.log.*" -mtime +30 -delete 2>/dev/null || true
        
        # Log rotation notification
        logger -t keycloak-logrotate "Keycloak container logs rotated"
    endscript
}

# Database logs (PostgreSQL for Keycloak)
/var/log/postgresql/postgresql-keycloak-*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 postgres postgres
    size 100M
    maxage 60
    
    postrotate
        # Reload PostgreSQL to reopen log files
        if systemctl is-active --quiet postgresql; then
            systemctl reload postgresql
        fi
        
        # Log database log rotation
        logger -t keycloak-db-logrotate "Keycloak database logs rotated"
    endscript
}

# Nginx access logs for Keycloak
/var/log/nginx/keycloak.access.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 www-data www-data
    size 100M
    maxage 90
    
    postrotate
        # Reload Nginx to reopen log files
        if systemctl is-active --quiet nginx; then
            systemctl reload nginx
        fi
        
        # Process access logs for security analysis
        if [ -f /opt/keycloak/scripts/analyze-access-logs.sh ]; then
            /opt/keycloak/scripts/analyze-access-logs.sh /var/log/nginx/keycloak.access.log.1 &
        fi
        
        # Extract authentication events for security monitoring
        if [ -f /var/log/nginx/keycloak.access.log.1 ]; then
            # Extract failed authentication attempts
            grep -E "(401|403|429)" /var/log/nginx/keycloak.access.log.1 > /var/log/keycloak/failed-auth.log 2>/dev/null || true
            
            # Extract successful authentication flows
            grep -E "/auth\?|/token\?" /var/log/nginx/keycloak.access.log.1 | grep " 200 " > /var/log/keycloak/successful-auth.log 2>/dev/null || true
        fi
    endscript
    
    # Shared options for web logs
    sharedscripts
}

# Nginx error logs for Keycloak
/var/log/nginx/keycloak.error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 www-data www-data
    size 50M
    maxage 90
    
    postrotate
        # Reload Nginx
        if systemctl is-active --quiet nginx; then
            systemctl reload nginx
        fi
        
        # Alert on error log rotation (indicates errors occurred)
        if [ -f /var/log/nginx/keycloak.error.log.1 ]; then
            logger -t keycloak-security "Keycloak Nginx error log rotated - check for issues"
            
            # Check for critical errors and send alerts
            if grep -qE "(502|503|504)" /var/log/nginx/keycloak.error.log.1; then
                logger -t keycloak-alert "Critical proxy errors detected in Keycloak logs"
            fi
        fi
    endscript
    
    sharedscripts
}

# Authentication event logs (custom application logs)
/var/log/keycloak/auth-events.log {
    daily
    rotate 365  # Keep authentication logs for 1 year
    compress
    delaycompress
    missingok
    notifempty
    create 0600 keycloak keycloak  # Strict permissions for auth logs
    size 100M
    maxage 365
    
    postrotate
        # Archive authentication logs securely
        if [ -f /var/log/keycloak/auth-events.log.1 ]; then
            # Copy to secure archive location
            cp /var/log/keycloak/auth-events.log.1 /opt/keycloak/backup/auth-events/auth-$(date +%Y%m%d-%H%M%S).log 2>/dev/null || true
            
            # Send alert about auth log rotation
            logger -t keycloak-security "Keycloak authentication log rotated and archived"
        fi
    endscript
}

# Admin console access logs
/var/log/keycloak/admin-access.log {
    daily
    rotate 365  # Keep admin logs for 1 year
    compress
    delaycompress
    missingok
    notifempty
    create 0600 keycloak keycloak  # Strict permissions
    size 50M
    maxage 365
    
    postrotate
        # Archive admin access logs
        if [ -f /var/log/keycloak/admin-access.log.1 ]; then
            cp /var/log/keycloak/admin-access.log.1 /opt/keycloak/backup/admin-logs/admin-$(date +%Y%m%d-%H%M%S).log 2>/dev/null || true
            logger -t keycloak-security "Keycloak admin access log rotated and archived"
        fi
    endscript
}

# SAML transaction logs
/var/log/keycloak/saml-transactions.log {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0644 keycloak keycloak
    size 50M
    maxage 90
    
    postrotate
        # Process SAML logs for compliance reporting
        if [ -f /opt/keycloak/scripts/process-saml-logs.sh ]; then
            /opt/keycloak/scripts/process-saml-logs.sh /var/log/keycloak/saml-transactions.log.1 &
        fi
        
        logger -t keycloak-logrotate "SAML transaction logs rotated"
    endscript
}

# OpenID Connect token logs
/var/log/keycloak/oidc-tokens.log {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0644 keycloak keycloak
    size 50M
    maxage 90
    
    postrotate
        # Process OIDC logs for analytics
        if [ -f /opt/keycloak/scripts/process-oidc-logs.sh ]; then
            /opt/keycloak/scripts/process-oidc-logs.sh /var/log/keycloak/oidc-tokens.log.1 &
        fi
        
        logger -t keycloak-logrotate "OIDC token logs rotated"
    endscript
}

# Performance monitoring logs
/var/log/keycloak/performance.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 keycloak keycloak
    size 50M
    maxage 60
    
    postrotate
        # Process performance metrics
        if [ -f /opt/keycloak/scripts/process-performance-logs.sh ]; then
            /opt/keycloak/scripts/process-performance-logs.sh /var/log/keycloak/performance.log.1 &
        fi
        
        logger -t keycloak-logrotate "Performance monitoring logs rotated"
    endscript
}

# Security audit logs
/var/log/keycloak/security-audit.log {
    daily
    rotate 365  # Keep security logs for 1 year
    compress
    delaycompress
    missingok
    notifempty
    create 0600 keycloak keycloak  # Strict permissions
    size 100M
    maxage 365
    
    postrotate
        # Archive security audit logs securely
        if [ -f /var/log/keycloak/security-audit.log.1 ]; then
            # Copy to secure archive location
            cp /var/log/keycloak/security-audit.log.1 /opt/keycloak/backup/security/security-audit-$(date +%Y%m%d-%H%M%S).log 2>/dev/null || true
            
            # Send alert about security log rotation
            logger -t keycloak-security "Keycloak security audit log rotated and archived"
            
            # Check for security events and send alerts
            if grep -qE "(FAILED_LOGIN|BRUTE_FORCE|ACCOUNT_LOCKED)" /var/log/keycloak/security-audit.log.1; then
                logger -t keycloak-alert "Security events detected in rotated audit log"
            fi
        fi
    endscript
}

# Application-specific logs
/opt/keycloak/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 keycloak keycloak
    size 50M
    maxage 30
    
    # Wildcard support
    sharedscripts
    
    postrotate
        # Clean up application logs
        find /opt/keycloak/logs/ -name "*.log.*" -mtime +30 -delete 2>/dev/null || true
        
        # Send log rotation notification
        logger -t keycloak-logrotate "Keycloak application logs rotated"
    endscript
}

# Backup operation logs
/opt/keycloak/backup/*.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 0600 keycloak keycloak
    size 10M
    maxage 60
    
    postrotate
        # Archive backup logs
        if [ -d /opt/keycloak/backup/logs ]; then
            mv /opt/keycloak/backup/*.log.*.gz /opt/keycloak/backup/logs/ 2>/dev/null || true
        fi
        
        logger -t keycloak-logrotate "Backup operation logs rotated"
    endscript
}

# JVM garbage collection logs (if enabled)
/opt/keycloak/logs/gc*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 keycloak keycloak
    size 50M
    maxage 14
    
    postrotate
        # Process GC logs for performance analysis
        if [ -f /opt/keycloak/scripts/analyze-gc-logs.sh ]; then
            /opt/keycloak/scripts/analyze-gc-logs.sh /opt/keycloak/logs/gc*.log.1 &
        fi
        
        logger -t keycloak-logrotate "JVM GC logs rotated"
    endscript
}

# System logs related to Keycloak
/var/log/syslog {
    # Extract Keycloak-related entries
    lastaction
        # Extract Keycloak entries from syslog
        grep -i "keycloak\|auth" /var/log/syslog.1 > /var/log/keycloak/system.log 2>/dev/null || true
        
        # Compress the extracted log
        gzip /var/log/keycloak/system.log 2>/dev/null || true
        
        logger -t keycloak-logrotate "System logs processed for Keycloak entries"
    endlastaction
}
