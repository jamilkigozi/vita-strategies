version: '3.8'

services:
  # Keycloak Identity and Access Management Platform
  keycloak:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: keycloak-server
    hostname: keycloak
    restart: unless-stopped
    
    # Security context
    user: "1000:1000"
    read_only: false
    
    # Capability management
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - NET_BIND_SERVICE
    
    # Security options
    security_opt:
      - no-new-privileges:true
      - seccomp:unconfined
    
    # Environment variables
    environment:
      # Core Keycloak configuration
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_DB_SCHEMA: public
      
      # Hostname and proxy configuration
      KC_HOSTNAME: auth.vitastrategies.com
      KC_HOSTNAME_ADMIN: auth.vitastrategies.com
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: edge
      KC_PROXY_ADDRESS_FORWARDING: "true"
      
      # Security configuration
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/conf/tls.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/conf/tls.key
      KC_HTTPS_CLIENT_AUTH: request
      KC_HTTPS_PORT: 8443
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
      
      # Admin configuration
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      
      # Features and optimizations
      KC_FEATURES: "token-exchange,admin-fine-grained-authz,recovery-codes,update-email"
      KC_TRANSACTION_XA_ENABLED: "false"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_SPI_THEME_STATIC_MAX_AGE: "2592000"
      KC_SPI_THEME_CACHE_THEMES: "true"
      KC_SPI_THEME_CACHE_TEMPLATES: "true"
      
      # Clustering configuration
      KC_CACHE: ispn
      KC_CACHE_STACK: tcp
      KC_CACHE_CONFIG_FILE: cache-ispn.xml
      
      # Logging configuration
      KC_LOG: console,file
      KC_LOG_LEVEL: INFO
      KC_LOG_FILE: /var/log/keycloak/keycloak.log
      KC_LOG_FORMAT: json
      KC_LOG_CONSOLE_FORMAT: "%d{yyyy-MM-dd HH:mm:ss,SSS} %-5p [%c] (%t) %s%e%n"
      
      # Vault integration (OpenBao)
      KC_VAULT_FILE: /opt/keycloak/conf/vault/vault.properties
      KC_SPI_VAULT_HASHICORP_VAULT_URL: https://vault.vitastrategies.com
      KC_SPI_VAULT_HASHICORP_VAULT_TOKEN: ${VAULT_TOKEN:-}
      
      # Performance tuning
      JAVA_OPTS: >-
        -server
        -Xms512m
        -Xmx2g
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=200
        -XX:ParallelGCThreads=4
        -XX:+DisableExplicitGC
        -XX:+UseStringDeduplication
        -XX:+OptimizeStringConcat
        -XX:+UseCompressedOops
        -XX:+UseCompressedClassPointers
        -Djava.awt.headless=true
        -Djava.net.preferIPv4Stack=true
        -Dfile.encoding=UTF-8
        -Duser.timezone=UTC
      
      # Security settings
      KC_SPI_LOGIN_PROTOCOL_OPENID_CONNECT_LEGACY_LOGOUT_REDIRECT_URI: "false"
      KC_SPI_LOGIN_PROTOCOL_OPENID_CONNECT_SUPPRESS_LOGOUT_CONFIRMATION_SCREEN: "false"
      KC_SPI_TRUSTSTORE_FILE_FILE: /opt/keycloak/conf/truststore.jks
      KC_SPI_TRUSTSTORE_FILE_PASSWORD: changeit
      
      # Health check configuration
      HEALTH_CHECK_TIMEOUT: "15"
      CRITICAL_THRESHOLD: "90"
      WARNING_THRESHOLD: "75"
    
    # Port mappings
    ports:
      - "8080:8080"  # HTTP port
      - "8443:8443"  # HTTPS port
      - "9000:9000"  # Metrics port
      - "9990:9990"  # Management port
    
    # Volume mounts
    volumes:
      # Persistent data storage
      - keycloak_data:/opt/keycloak/data
      - keycloak_logs:/var/log/keycloak
      - keycloak_backup:/opt/keycloak/backup
      
      # Configuration files
      - ./conf:/opt/keycloak/conf:ro
      - ./themes:/opt/keycloak/themes:ro
      - ./providers:/opt/keycloak/providers:ro
      - ./data/import:/opt/keycloak/data/import:ro
      - ./scripts:/opt/keycloak/scripts:ro
      
      # TLS certificates (if available)
      - ${TLS_CERT_PATH:-./secrets/tls.crt}:/opt/keycloak/conf/tls.crt:ro
      - ${TLS_KEY_PATH:-./secrets/tls.key}:/opt/keycloak/conf/tls.key:ro
      - ${TLS_CA_PATH:-./secrets/ca.crt}:/opt/keycloak/conf/ca.crt:ro
      
      # Vault configuration
      - ${VAULT_CONFIG_PATH:-./secrets/vault.properties}:/opt/keycloak/conf/vault/vault.properties:ro
      
      # Local timezone
      - /etc/localtime:/etc/localtime:ro
    
    # Network configuration
    networks:
      - keycloak_network
      - postgres_network
    
    # Dependency management
    depends_on:
      postgres:
        condition: service_healthy
    
    # Health check
    healthcheck:
      test: ["/opt/keycloak/healthcheck.sh"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "keycloak"
    
    # Labels for service discovery
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`auth.vitastrategies.com`)"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
      - "traefik.http.routers.keycloak.middlewares=secure-headers@file"
      - "service.name=keycloak"
      - "service.version=1.0.0"
      - "service.description=Keycloak Identity and Access Management Platform"

  # PostgreSQL Database for Keycloak
  postgres:
    image: postgres:15-alpine
    container_name: keycloak-postgres
    hostname: postgres
    restart: unless-stopped
    
    # Security context
    user: postgres
    
    # Environment variables
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      PGDATA: /var/lib/postgresql/data/pgdata
    
    # Volume mounts
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./scripts/postgres-tuning.conf:/etc/postgresql/postgresql.conf:ro
      - /etc/localtime:/etc/localtime:ro
    
    # Network configuration
    networks:
      - postgres_network
    
    # Health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak_user -d keycloak"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "keycloak-postgres"
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    # Labels
    labels:
      - "service.name=keycloak-postgres"
      - "service.version=15"
      - "service.description=PostgreSQL database for Keycloak"

  # Redis for session storage and caching
  redis:
    image: redis:7-alpine
    container_name: keycloak-redis
    hostname: redis
    restart: unless-stopped
    
    # Security context
    user: redis
    
    # Command with security configurations
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 300
    
    # Volume mounts
    volumes:
      - redis_data:/data
      - /etc/localtime:/etc/localtime:ro
    
    # Network configuration
    networks:
      - keycloak_network
    
    # Health check
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 256M
          cpus: '0.1'
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        tag: "keycloak-redis"
    
    # Security options
    security_opt:
      - no-new-privileges:true
    
    # Labels
    labels:
      - "service.name=keycloak-redis"
      - "service.version=7"
      - "service.description=Redis cache for Keycloak"

  # Mailhog for development email testing (optional)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: keycloak-mailhog
    hostname: mailhog
    restart: unless-stopped
    profiles:
      - development
    
    # Port mappings
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI port
    
    # Network configuration
    networks:
      - keycloak_network
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
    
    # Labels
    labels:
      - "service.name=keycloak-mailhog"
      - "service.description=Email testing for Keycloak development"

# Named volumes for data persistence
volumes:
  keycloak_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/keycloak
  
  keycloak_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs
  
  keycloak_backup:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./backup
  
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/postgres
  
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis

# Network definitions
networks:
  keycloak_network:
    driver: bridge
    name: keycloak_network
    ipam:
      config:
        - subnet: 172.22.0.0/16
    driver_opts:
      com.docker.network.bridge.name: keycloak0
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"
  
  postgres_network:
    driver: bridge
    name: postgres_network
    internal: true
    ipam:
      config:
        - subnet: 172.23.0.0/16
    driver_opts:
      com.docker.network.bridge.name: kcpostgres0
      com.docker.network.bridge.enable_icc: "true"
