# Keycloak Nginx Configuration
# Reverse proxy configuration for identity and access management platform

upstream keycloak_backend {
    # Multiple Keycloak instances for high availability
    server keycloak-1:8080 max_fails=3 fail_timeout=30s weight=1;
    server keycloak-2:8080 max_fails=3 fail_timeout=30s weight=1 backup;
    server keycloak-3:8080 max_fails=3 fail_timeout=30s weight=1 backup;
    
    # Health check and connection management
    keepalive 32;
    keepalive_requests 100;
    keepalive_timeout 60s;
}

# Rate limiting zones for different endpoints
limit_req_zone $binary_remote_addr zone=keycloak_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=keycloak_api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=keycloak_admin:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=keycloak_ui:10m rate=30r/m;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=keycloak_conn:10m;

# Map for OIDC/OAuth2 endpoints
map $request_uri $is_oidc_endpoint {
    default 0;
    ~*/auth$ 1;
    ~*/token$ 1;
    ~*/userinfo$ 1;
    ~*/logout$ 1;
    ~*/certs$ 1;
    ~*/protocol/openid-connect/ 1;
    ~*/protocol/saml/ 1;
}

# Main server block for Keycloak
server {
    listen 80;
    listen [::]:80;
    server_name auth.vitastrategies.com;
    
    # Security headers
    include /etc/nginx/snippets/security-headers.conf;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.vitastrategies.com;
    
    # SSL configuration
    ssl_certificate /etc/ssl/certs/auth.vitastrategies.com.crt;
    ssl_certificate_key /etc/ssl/private/auth.vitastrategies.com.key;
    ssl_trusted_certificate /etc/ssl/certs/ca-bundle.crt;
    
    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Security headers specific to identity management
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;  # Allow same-origin for admin console
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; form-action 'self';" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Keycloak-Server "vita-strategies" always;
    
    # Remove server tokens
    server_tokens off;
    
    # Request size limits (larger for SAML responses)
    client_max_body_size 2M;
    client_body_buffer_size 256k;
    client_header_buffer_size 2k;
    large_client_header_buffers 8 8k;
    
    # Timeout configurations
    client_body_timeout 30;
    client_header_timeout 30;
    keepalive_timeout 65;
    send_timeout 30;
    
    # Rate limiting
    limit_req_status 429;
    limit_conn_status 429;
    limit_conn keycloak_conn 20;
    
    # Logging configuration
    access_log /var/log/nginx/keycloak.access.log main buffer=16k flush=5m;
    error_log /var/log/nginx/keycloak.error.log warn;
    
    # Main Keycloak application
    location / {
        # General rate limiting
        limit_req zone=keycloak_api burst=30 nodelay;
        
        # Proxy settings
        proxy_pass http://keycloak_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Headers for Keycloak proxy mode
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-Ssl on;
        
        # Proxy timeouts (longer for authentication flows)
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        
        # Proxy buffering
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 8k;
        proxy_busy_buffers_size 16k;
        
        # Cache settings
        proxy_cache_bypass $http_upgrade;
        
        # No caching for dynamic content
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # Authentication endpoints with stricter rate limiting
    location ~* ^/realms/[^/]+/protocol/openid-connect/(auth|token|logout|userinfo|certs|login-status-iframe.html) {
        limit_req zone=keycloak_auth burst=5 nodelay;
        limit_req zone=keycloak_api burst=15 nodelay;
        
        # Proxy settings
        proxy_pass http://keycloak_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-Ssl on;
        
        # Extended timeouts for authentication flows
        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # No caching for auth endpoints
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # SAML protocol endpoints
    location ~* ^/realms/[^/]+/protocol/saml/ {
        limit_req zone=keycloak_auth burst=5 nodelay;
        
        # Proxy settings with larger buffer for SAML
        proxy_pass http://keycloak_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-Ssl on;
        
        # Increased buffer sizes for SAML responses
        proxy_buffer_size 16k;
        proxy_buffers 32 16k;
        proxy_busy_buffers_size 32k;
        
        # Extended timeouts for SAML processing
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # No caching for SAML endpoints
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    
    # Admin console with restricted access
    location /admin/ {
        limit_req zone=keycloak_admin burst=10 nodelay;
        
        # IP restrictions for admin console (adjust as needed)
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # allow 192.168.0.0/16;
        # deny all;
        
        # Proxy settings
        proxy_pass http://keycloak_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-Ssl on;
        
        # Admin console specific headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # Extended timeouts for admin operations
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Cache static admin console assets
        location ~* /admin/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1d;
            add_header Cache-Control "public, immutable";
            add_header Vary "Accept-Encoding";
        }
    }
    
    # Static resources with caching
    location ~* ^/realms/[^/]+/login-actions/authenticate {
        limit_req zone=keycloak_auth burst=3 nodelay;
        
        proxy_pass http://keycloak_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Forwarded-Ssl on;
        
        # No caching for login actions
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    
    # Static resources (themes, CSS, JS, images)
    location ~* ^/realms/[^/]+/login/resources/ {
        limit_req zone=keycloak_ui burst=20 nodelay;
        
        proxy_pass http://keycloak_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static resources
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        
        # Compress static content
        gzip on;
        gzip_types text/css application/javascript image/svg+xml;
    }
    
    # Health check endpoint (no rate limiting)
    location /health {
        # Allow health checks from monitoring systems
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        
        proxy_pass http://keycloak_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Quick timeouts for health checks
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        
        # Cache health check responses briefly
        add_header Cache-Control "public, max-age=30";
    }
    
    # Metrics endpoint for monitoring
    location /metrics {
        # Restrict access to monitoring systems
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 127.0.0.1;
        deny all;
        
        proxy_pass http://keycloak_backend:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # No caching for metrics
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
    
    # Realm discovery endpoint (publicly accessible, cached)
    location ~* ^/realms/[^/]+/?$ {
        proxy_pass http://keycloak_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache realm metadata
        add_header Cache-Control "public, max-age=300";
    }
    
    # Well-known OpenID Connect configuration (publicly accessible, cached)
    location ~* ^/realms/[^/]+/\.well-known/openid_configuration$ {
        proxy_pass http://keycloak_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache OIDC configuration
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
    }
    
    # Block access to sensitive management endpoints
    location ~ ^/(realms/master/|admin/master/) {
        # Restrict master realm access to admin networks only
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        proxy_pass http://keycloak_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Security.txt for security researchers
    location /.well-known/security.txt {
        return 200 "Contact: security@vitastrategies.com\nExpires: 2024-12-31T23:59:59.000Z\nPreferred-Languages: en\nCanonical: https://auth.vitastrategies.com/.well-known/security.txt";
        add_header Content-Type text/plain;
    }
    
    # Deny access to hidden files and directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Deny access to backup and config files
    location ~* \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

# Health check server for load balancer
server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    
    # Simple health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Nginx status for monitoring
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }
    
    # Deny all other requests
    location / {
        deny all;
        return 404;
    }
}
