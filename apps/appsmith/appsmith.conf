# Appsmith Internal Tools Platform Configuration
# File: appsmith.conf
# Purpose: Advanced configuration settings for production deployment

[application]
# Application identification
name = "Vita Strategies Internal Tools"
description = "Low-code Platform for Internal Applications"
version = "1.9.50"
environment = "production"

# Server configuration
[server]
port = 80
host = "0.0.0.0"
domain = "tools.vitastrategies.com"
base_url = "https://tools.vitastrategies.com"
force_ssl = true
session_timeout = 3600
max_request_size = "100MB"

# Database configuration
[database]
type = "postgres"
host = "postgres"
port = 5432
name = "appsmith"
username = "appsmith_user"
# Password set via environment variable
ssl_mode = "require"
connection_pool_size = 20
connection_timeout = 30
query_timeout = 60
migration_auto = true

# Redis configuration
[redis]
enabled = true
host = "redis"
port = 6379
database = 0
password = ""
connection_pool_size = 10
timeout = 5000

# Security configuration
[security]
encryption_password = ""  # Set via environment variable
encryption_salt = ""      # Set via environment variable
session_secret = ""       # Set via environment variable
csrf_protection = true
xss_protection = true
content_type_protection = true
frame_options = "SAMEORIGIN"
hsts_enabled = true
hsts_max_age = 31536000

# Content Security Policy
csp_enabled = true
csp_report_only = false
csp_directives = {
    "default-src": "'self'",
    "script-src": "'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com",
    "style-src": "'self' 'unsafe-inline' https://fonts.googleapis.com",
    "img-src": "'self' data: blob: https:",
    "font-src": "'self' https://fonts.gstatic.com",
    "connect-src": "'self' wss: https:",
    "frame-src": "'self' https:",
    "object-src": "'none'"
}

# Authentication configuration
[auth]
# Local authentication
local_enabled = true
signup_enabled = false
signup_allowed_domains = ["vitastrategies.com"]
password_min_length = 12
password_complexity = true
account_lockout_attempts = 5
account_lockout_duration = 1800

# Session configuration
session_provider = "redis"
session_timeout = 3600
remember_me_duration = 604800
concurrent_sessions_limit = 5

# SSO - OIDC configuration
[auth.oidc]
enabled = false
provider_name = "Keycloak"
client_id = ""
client_secret = ""
issuer_url = ""
authorization_url = ""
token_url = ""
userinfo_url = ""
jwks_url = ""
scopes = ["openid", "email", "profile"]
username_attribute = "preferred_username"
email_attribute = "email"
name_attribute = "name"
auto_signup = true
role_mapping = {
    "admin": "Administrator",
    "editor": "Developer",
    "viewer": "Viewer"
}

# SAML configuration
[auth.saml]
enabled = false
entity_id = "appsmith"
metadata_url = ""
redirect_url = ""
username_attribute = "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress"
email_attribute = "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/emailaddress"
first_name_attribute = "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/givenname"
last_name_attribute = "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/surname"

# Email configuration
[email]
enabled = false
host = "smtp.gmail.com"
port = 587
username = ""
password = ""
from_address = "tools@vitastrategies.com"
from_name = "Vita Strategies Tools"
reply_to = "noreply@vitastrategies.com"
tls_enabled = true
auth_required = true

# File storage configuration
[storage]
provider = "local"
local_path = "/appsmith-stacks/data/uploads"
max_file_size = "100MB"
allowed_extensions = [
    "jpg", "jpeg", "png", "gif", "svg", "webp",
    "pdf", "doc", "docx", "xls", "xlsx", "ppt", "pptx",
    "txt", "csv", "json", "xml", "yaml", "yml"
]

# AWS S3 configuration (alternative)
[storage.s3]
enabled = false
bucket_name = ""
region = ""
access_key = ""
secret_key = ""
endpoint = ""

# MinIO configuration (alternative)
[storage.minio]
enabled = false
endpoint = "http://minio:9000"
access_key = ""
secret_key = ""
bucket_name = "appsmith"

# Logging configuration
[logging]
level = "INFO"
format = "json"
timestamp_format = "ISO8601"
max_file_size = "100MB"
max_files = 10

# Application logging
[logging.application]
enabled = true
file = "/var/log/appsmith/application.log"
level = "INFO"

# Access logging
[logging.access]
enabled = true
file = "/var/log/appsmith/access.log"
format = "combined"

# Error logging
[logging.error]
enabled = true
file = "/var/log/appsmith/error.log"
level = "ERROR"

# Audit logging
[logging.audit]
enabled = true
file = "/var/log/appsmith/audit.log"
level = "INFO"
events = ["login", "logout", "create", "update", "delete", "deploy"]

# Performance logging
[logging.performance]
enabled = true
file = "/var/log/appsmith/performance.log"
slow_query_threshold = 1000
slow_request_threshold = 5000

# API configuration
[api]
rate_limiting_enabled = true
requests_per_minute = 1000
requests_per_hour = 10000
timeout = 30000
max_concurrent_requests = 100

# Webhook configuration
[webhooks]
enabled = true
timeout = 30000
max_retries = 3
retry_delay = 1000

# Datasource configuration
[datasources]
timeout = 30000
connection_pool_size = 10
ssl_verification = true
allow_self_signed = false

# Default datasource limits
query_timeout = 60000
result_limit = 10000
connection_timeout = 30000

# Plugin configuration
[plugins]
marketplace_enabled = false
auto_update = false
custom_plugins_path = "/appsmith-stacks/plugins"
allowed_plugins = [
    "postgres-plugin",
    "mysql-plugin",
    "mongodb-plugin",
    "redis-plugin",
    "rest-api",
    "graphql-plugin",
    "s3-plugin"
]

# Widget configuration
[widgets]
custom_widgets_enabled = true
custom_widgets_path = "/appsmith-stacks/widgets"
widget_bundling = true
lazy_loading = true

# Application configuration
[applications]
max_apps_per_user = 50
max_pages_per_app = 100
auto_save_enabled = true
auto_save_interval = 30000
version_control_enabled = true
max_versions = 50

# Collaboration features
multiplayer_enabled = false
comments_enabled = true
real_time_editing = false

# Performance configuration
[performance]
# Client-side caching
client_cache_enabled = true
client_cache_duration = 3600

# Server-side caching
server_cache_enabled = true
server_cache_duration = 1800
server_cache_size = 1000

# Query caching
query_cache_enabled = true
query_cache_duration = 300
query_cache_size = 500

# CDN configuration
cdn_enabled = false
cdn_url = ""

# Backup configuration
[backup]
enabled = true
schedule = "0 2 * * *"  # Daily at 2 AM
retention_days = 30
backup_path = "/appsmith-stacks/backups"
include_uploads = true
compression_enabled = true

# Restore configuration
restore_timeout = 3600
restore_verification = true

# Monitoring configuration
[monitoring]
enabled = true
metrics_enabled = true
health_check_enabled = true
health_check_interval = 30

# Prometheus metrics
prometheus_enabled = false
prometheus_port = 9090
prometheus_path = "/metrics"

# Custom metrics
custom_metrics_enabled = true
user_activity_tracking = true
application_usage_tracking = true
performance_tracking = true

# Feature flags
[features]
tenant_isolation = false
advanced_permissions = true
white_labeling = false
custom_branding = true
git_integration = false
version_control = true
app_templates = true
workflow_automation = false

# Enterprise features
[enterprise]
license_key = ""
support_enabled = false
premium_plugins = false
advanced_analytics = false
priority_support = false

# Compliance configuration
[compliance]
gdpr_enabled = true
data_retention_enabled = true
data_export_enabled = true
audit_trail_enabled = true
encryption_at_rest = true

# Data retention policies
user_data_retention = 2555  # 7 years
audit_log_retention = 2555  # 7 years
application_data_retention = 1095  # 3 years

# Integration configuration
[integrations]
# WordPress integration
wordpress_enabled = true
wordpress_url = "https://cms.vitastrategies.com"

# Metabase integration
metabase_enabled = true
metabase_url = "https://analytics.vitastrategies.com"

# Grafana integration
grafana_enabled = true
grafana_url = "https://monitoring.vitastrategies.com"

# Keycloak integration
keycloak_enabled = true
keycloak_url = "https://auth.vitastrategies.com"

# Mattermost integration
mattermost_enabled = true
mattermost_url = "https://chat.vitastrategies.com"

# ERPNext integration
erpnext_enabled = true
erpnext_url = "https://erp.vitastrategies.com"

# Advanced configuration
[advanced]
# Memory management
heap_size = "2g"
max_heap_size = "4g"
gc_algorithm = "G1GC"

# Thread pool configuration
web_threads = 50
worker_threads = 20
scheduler_threads = 10

# Connection pool configuration
db_connection_pool_min = 5
db_connection_pool_max = 20
redis_connection_pool_min = 2
redis_connection_pool_max = 10

# Request handling
max_request_size = 104857600  # 100MB
max_form_size = 10485760     # 10MB
request_timeout = 300000     # 5 minutes

# Development mode
[development]
enabled = false
hot_reload = false
debug_mode = false
profiling_enabled = false
source_maps = false
