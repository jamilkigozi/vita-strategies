# Nginx configuration for Appsmith Internal Tools Platform
# File: nginx.conf

upstream appsmith_backend {
    server appsmith:80 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=appsmith_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=appsmith_app:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=appsmith_login:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=appsmith_upload:10m rate=10r/s;

server {
    listen 80;
    server_name tools.vitastrategies.com;
    
    # Security headers
    include /etc/nginx/snippets/security-headers.conf;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tools.vitastrategies.com;
    
    # SSL Configuration
    ssl_certificate /etc/ssl/certs/vitastrategies.com.crt;
    ssl_certificate_key /etc/ssl/private/vitastrategies.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Security headers
    include /etc/nginx/snippets/security-headers.conf;
    
    # Additional headers for internal tools platform
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Content Security Policy for Appsmith
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        img-src 'self' data: blob: https:;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self' wss: https: ${KEYCLOAK_URL:-};
        frame-src 'self' https:;
        frame-ancestors 'self';
        form-action 'self';
        base-uri 'self';
        object-src 'none';
    " always;
    
    # Logging
    access_log /var/log/nginx/appsmith_access.log main;
    error_log /var/log/nginx/appsmith_error.log;
    
    # Client settings for file uploads
    client_max_body_size 100M;
    client_body_timeout 300s;
    client_header_timeout 60s;
    
    # Proxy settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;
    proxy_busy_buffers_size 16k;
    
    # Login endpoint (stricter rate limiting)
    location /login {
        limit_req zone=appsmith_login burst=10 nodelay;
        
        proxy_pass http://appsmith_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cache_bypass $http_upgrade;
    }
    
    # API endpoints (moderate rate limiting)
    location /api/ {
        limit_req zone=appsmith_api burst=50 nodelay;
        
        proxy_pass http://appsmith_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cache_bypass $http_upgrade;
        
        # API-specific headers
        proxy_set_header Accept-Encoding gzip;
        
        # Longer timeouts for data operations
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
    
    # File upload endpoints
    location ~ ^/api/v1/(assets|files)/ {
        limit_req zone=appsmith_upload burst=20 nodelay;
        
        proxy_pass http://appsmith_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Extended timeouts for file uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # Disable buffering for large file uploads
        proxy_request_buffering off;
        proxy_buffering off;
    }
    
    # Application and page resources
    location / {
        limit_req zone=appsmith_app burst=100 nodelay;
        
        proxy_pass http://appsmith_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cache_bypass $http_upgrade;
        
        # Enable gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/json
            application/javascript
            application/xml+rss
            application/atom+xml
            image/svg+xml;
    }
    
    # WebSocket support for real-time features
    location /websocket {
        proxy_pass http://appsmith_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    
    # Static assets caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
        proxy_pass http://appsmith_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static assets for longer
        expires 1M;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        
        # Enable gzip for static assets
        gzip on;
        gzip_static on;
        gzip_vary on;
    }
    
    # Application preview endpoints
    location /app/ {
        proxy_pass http://appsmith_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cache_bypass $http_upgrade;
        
        # Allow iframe embedding for app previews
        add_header X-Frame-Options "ALLOWALL" always;
    }
    
    # Health check endpoint
    location /api/v1/health {
        access_log off;
        proxy_pass http://appsmith_backend/api/v1/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    # Admin endpoints (restricted access)
    location /api/v1/admin/ {
        # Allow only internal networks
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        proxy_pass http://appsmith_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block access to configuration files
    location ~ \.(conf|ini|env)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Security.txt
    location /.well-known/security.txt {
        return 301 https://vitastrategies.com/.well-known/security.txt;
    }
}

# File storage subdomain (MinIO)
server {
    listen 443 ssl http2;
    server_name files.tools.vitastrategies.com;
    
    # SSL Configuration (shared)
    ssl_certificate /etc/ssl/certs/vitastrategies.com.crt;
    ssl_certificate_key /etc/ssl/private/vitastrategies.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Security headers
    include /etc/nginx/snippets/security-headers.conf;
    
    # Logging
    access_log /var/log/nginx/minio_access.log main;
    error_log /var/log/nginx/minio_error.log;
    
    # Client settings for large file uploads
    client_max_body_size 1G;
    client_body_timeout 600s;
    client_header_timeout 60s;
    
    # Proxy to MinIO
    location / {
        proxy_pass http://minio:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Extended timeouts for large files
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # Disable buffering for file operations
        proxy_request_buffering off;
        proxy_buffering off;
    }
}

# Internal tools status page
server {
    listen 443 ssl http2;
    server_name status.tools.vitastrategies.com;
    
    # SSL Configuration (shared)
    ssl_certificate /etc/ssl/certs/vitastrategies.com.crt;
    ssl_certificate_key /etc/ssl/private/vitastrategies.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Security headers
    include /etc/nginx/snippets/security-headers.conf;
    
    # Simple status page
    location / {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "Internal Tools Platform Status: OK\nTimestamp: $time_iso8601\n";
    }
    
    # Detailed health check
    location /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"healthy","timestamp":"$time_iso8601","services":{"appsmith":"up","postgres":"up","redis":"up"}}';
    }
    
    # Applications endpoint
    location /applications {
        proxy_pass http://appsmith_backend/api/v1/applications;
        proxy_http_version 1.1;
        proxy_set_header Host tools.vitastrategies.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
