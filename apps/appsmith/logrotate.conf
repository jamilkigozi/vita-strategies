# Logrotate configuration for Appsmith Internal Tools Platform
# File: logrotate.conf
# Purpose: Manage log rotation for Appsmith application and related services

# Appsmith application logs
/var/log/appsmith/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appsmith appsmith
    
    # Post-rotation actions
    postrotate
        # Restart Appsmith to reopen log files
        if [ -f /var/run/supervisord.pid ]; then
            supervisorctl restart appsmith 2>/dev/null || true
        fi
        
        # Alternatively, restart the container if needed
        # docker restart appsmith-server 2>/dev/null || true
    endscript
    
    # Pre-rotation actions
    prerotate
        # Create log directory if it doesn't exist
        if [ ! -d /var/log/appsmith ]; then
            mkdir -p /var/log/appsmith
            chown appsmith:appsmith /var/log/appsmith
        fi
    endscript
}

# Appsmith audit logs (if enabled)
/var/log/appsmith/audit/*.log {
    daily
    rotate 365
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appsmith appsmith
    
    # Keep audit logs for compliance (1 year)
    maxage 365
    
    postrotate
        # Ensure audit log integrity
        chmod 0400 /var/log/appsmith/audit/*.log.*.gz 2>/dev/null || true
    endscript
}

# Nginx access logs for Appsmith
/var/log/nginx/appsmith_access.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 nginx nginx
    sharedscripts
    
    postrotate
        # Reload nginx to reopen log files
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}

# Nginx error logs for Appsmith
/var/log/nginx/appsmith_error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 nginx nginx
    sharedscripts
    
    postrotate
        # Reload nginx to reopen log files
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}

# Nginx access logs for MinIO file storage
/var/log/nginx/minio_access.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 nginx nginx
    sharedscripts
    
    postrotate
        # Reload nginx to reopen log files
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}

# Nginx error logs for MinIO file storage
/var/log/nginx/minio_error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 nginx nginx
    sharedscripts
    
    postrotate
        # Reload nginx to reopen log files
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}

# PostgreSQL logs for Appsmith database
/var/log/postgresql/appsmith-postgresql*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 postgres postgres
    
    postrotate
        # Reload PostgreSQL to reopen log files
        if [ -f /var/run/postgresql/postgresql.pid ]; then
            kill -HUP $(cat /var/run/postgresql/postgresql.pid) 2>/dev/null || true
        fi
    endscript
}

# Redis logs
/var/log/redis/appsmith-redis*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 redis redis
    
    postrotate
        # Redis handles log rotation internally, just ensure directory exists
        if [ ! -d /var/log/redis ]; then
            mkdir -p /var/log/redis
            chown redis:redis /var/log/redis
        fi
    endscript
}

# MongoDB logs (if using MongoDB)
/var/log/mongodb/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 mongodb mongodb
    
    postrotate
        # Send USR1 signal to MongoDB to reopen log files
        if [ -f /var/run/mongodb/mongod.pid ]; then
            kill -USR1 $(cat /var/run/mongodb/mongod.pid) 2>/dev/null || true
        fi
    endscript
}

# MinIO logs
/var/log/minio/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 minio minio
    
    postrotate
        # MinIO handles log rotation internally
        find /var/log/minio -name "*.log.*.gz" -mtime +30 -delete 2>/dev/null || true
    endscript
}

# Docker container logs (if using Docker logging)
/var/lib/docker/containers/*/*-json.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    
    # Only rotate logs for Appsmith-related containers
    prerotate
        CONTAINER_NAME=$(basename $(dirname $1))
        CONTAINER_INFO=$(docker inspect $CONTAINER_NAME 2>/dev/null | jq -r '.[0].Config.Labels["service.name"]' 2>/dev/null)
        if [[ "$CONTAINER_INFO" != "appsmith" ]] && [[ "$CONTAINER_INFO" != "postgres" ]] && [[ "$CONTAINER_INFO" != "redis" ]]; then
            exit 1
        fi
    endscript
}

# Appsmith backup logs
/var/log/appsmith/backup/*.log {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appsmith appsmith
    
    # Keep backup logs for 3 months
    maxage 90
    
    postrotate
        # Cleanup old backup logs
        find /var/log/appsmith/backup -name "*.log.*.gz" -mtime +90 -delete 2>/dev/null || true
    endscript
}

# Appsmith application deployment logs
/var/log/appsmith/deployment/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appsmith appsmith
    
    # Keep deployment logs for analysis
    maxage 30
    
    postrotate
        # Generate deployment summary if script exists
        if [ -x /opt/appsmith/scripts/deployment-summary.sh ]; then
            /opt/appsmith/scripts/deployment-summary.sh 2>/dev/null || true
        fi
    endscript
}

# Appsmith performance logs
/var/log/appsmith/performance/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appsmith appsmith
    
    # Performance logs for 2 weeks
    maxage 14
    
    postrotate
        # Generate performance summary if script exists
        if [ -x /opt/appsmith/scripts/performance-summary.sh ]; then
            /opt/appsmith/scripts/performance-summary.sh 2>/dev/null || true
        fi
    endscript
}

# Appsmith application usage logs
/var/log/appsmith/usage/*.log {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appsmith appsmith
    
    # Keep usage logs longer for analytics
    maxage 90
    
    postrotate
        # Clean up old usage logs
        find /var/log/appsmith/usage -name "*.log.*.gz" -mtime +90 -delete 2>/dev/null || true
    endscript
}

# Appsmith security logs
/var/log/appsmith/security/*.log {
    daily
    rotate 180
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appsmith appsmith
    
    # Keep security logs for 6 months
    maxage 180
    
    postrotate
        # Ensure security log integrity
        chmod 0400 /var/log/appsmith/security/*.log.*.gz 2>/dev/null || true
        
        # Security log analysis if script exists
        if [ -x /opt/appsmith/scripts/security-analysis.sh ]; then
            /opt/appsmith/scripts/security-analysis.sh 2>/dev/null || true
        fi
    endscript
}

# Appsmith API logs
/var/log/appsmith/api/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appsmith appsmith
    
    # API logs for troubleshooting
    maxage 30
    
    postrotate
        # API usage analysis if script exists
        if [ -x /opt/appsmith/scripts/api-analysis.sh ]; then
            /opt/appsmith/scripts/api-analysis.sh 2>/dev/null || true
        fi
    endscript
}

# Appsmith database query logs (if enabled)
/var/log/appsmith/queries/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appsmith appsmith
    
    # Query logs for performance analysis (shorter retention)
    maxage 7
    
    postrotate
        # Query performance analysis if script exists
        if [ -x /opt/appsmith/scripts/query-analysis.sh ]; then
            /opt/appsmith/scripts/query-analysis.sh 2>/dev/null || true
        fi
    endscript
}

# Supervisor logs (process manager)
/var/log/supervisor/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
    
    postrotate
        # Restart supervisor to reopen log files
        if [ -f /var/run/supervisord.pid ]; then
            supervisorctl reread && supervisorctl update 2>/dev/null || true
        fi
    endscript
}

# Health check logs
/var/log/appsmith/health-check.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appsmith appsmith
    
    # Keep health check logs for shorter period
    maxage 7
}

