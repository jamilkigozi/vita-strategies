# Log rotation configuration for ERPNext
# Manages log files to prevent disk space issues

# ERPNext application logs
/var/log/erpnext/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 644 frappe frappe
    sharedscripts
    postrotate
        # Send USR1 signal to gunicorn to reopen log files
        if [ -f /var/run/erpnext/gunicorn.pid ]; then
            kill -USR1 $(cat /var/run/erpnext/gunicorn.pid)
        fi
        
        # Restart supervisor processes if needed
        if command -v supervisorctl >/dev/null 2>&1; then
            supervisorctl restart erpnext-web >/dev/null 2>&1 || true
        fi
    endscript
}

# Supervisor logs
/var/log/supervisor/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 644 root root
    postrotate
        if [ -f /var/run/supervisord.pid ]; then
            kill -USR2 $(cat /var/run/supervisord.pid)
        fi
    endscript
}

# Nginx access and error logs (if running locally)
/var/log/nginx/*.log {
    daily
    missingok
    rotate 52
    compress
    delaycompress
    notifempty
    create 644 nginx nginx
    sharedscripts
    postrotate
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid)
        fi
    endscript
}

# Database logs (if local MySQL/MariaDB)
/var/log/mysql/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 640 mysql mysql
    sharedscripts
    postrotate
        mysqladmin flush-logs
    endscript
}

# Redis logs (if local Redis)
/var/log/redis/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 640 redis redis
    postrotate
        # Redis handles log rotation internally, just restart if needed
        if [ -f /var/run/redis/redis-server.pid ]; then
            kill -USR1 $(cat /var/run/redis/redis-server.pid)
        fi
    endscript
}

# Backup logs
/var/log/erpnext/backup.log {
    weekly
    missingok
    rotate 12
    compress
    delaycompress
    notifempty
    create 644 frappe frappe
}

# System health check logs
/var/log/erpnext/healthcheck.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    create 644 frappe frappe
}
