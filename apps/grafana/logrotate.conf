# Logrotate configuration for Grafana Monitoring Platform
# File: logrotate.conf
# Purpose: Manage log rotation for Grafana, Prometheus, and monitoring logs

# Grafana application logs
/var/log/grafana/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 grafana grafana
    
    # Post-rotation actions
    postrotate
        # Send HUP signal to Grafana to reopen log files
        if [ -f /var/run/grafana-server.pid ]; then
            kill -HUP $(cat /var/run/grafana-server.pid) 2>/dev/null || true
        fi
        
        # Alternatively, restart the container if needed
        # docker restart grafana-server 2>/dev/null || true
    endscript
    
    # Pre-rotation actions
    prerotate
        # Create log directory if it doesn't exist
        if [ ! -d /var/log/grafana ]; then
            mkdir -p /var/log/grafana
            chown grafana:grafana /var/log/grafana
        fi
    endscript
}

# Grafana health check logs
/var/log/grafana/health-check.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 grafana grafana
    
    # Keep health check logs for shorter period
    maxage 7
}

# Nginx access logs for Grafana
/var/log/nginx/grafana_access.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 nginx nginx
    sharedscripts
    
    postrotate
        # Reload nginx to reopen log files
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}

# Nginx error logs for Grafana
/var/log/nginx/grafana_error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 nginx nginx
    sharedscripts
    
    postrotate
        # Reload nginx to reopen log files
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}

# Nginx access logs for Prometheus
/var/log/nginx/prometheus_access.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 nginx nginx
    sharedscripts
    
    postrotate
        # Reload nginx to reopen log files
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}

# Nginx error logs for Prometheus
/var/log/nginx/prometheus_error.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 nginx nginx
    sharedscripts
    
    postrotate
        # Reload nginx to reopen log files
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
        fi
    endscript
}

# Prometheus logs (if local)
/var/log/prometheus/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 prometheus prometheus
    
    postrotate
        # Send HUP signal to Prometheus to reopen log files
        if [ -f /var/run/prometheus.pid ]; then
            kill -HUP $(cat /var/run/prometheus.pid) 2>/dev/null || true
        fi
    endscript
}

# PostgreSQL logs for Grafana database
/var/log/postgresql/grafana-postgresql*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 postgres postgres
    
    postrotate
        # Reload PostgreSQL to reopen log files
        if [ -f /var/run/postgresql/postgresql.pid ]; then
            kill -HUP $(cat /var/run/postgresql/postgresql.pid) 2>/dev/null || true
        fi
    endscript
}

# Redis logs
/var/log/redis/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 redis redis
    
    postrotate
        # Redis handles log rotation internally, just ensure directory exists
        if [ ! -d /var/log/redis ]; then
            mkdir -p /var/log/redis
            chown redis:redis /var/log/redis
        fi
    endscript
}

# Docker container logs (if using Docker logging)
/var/lib/docker/containers/*/*-json.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    
    # Only rotate logs for Grafana-related containers
    prerotate
        CONTAINER_NAME=$(basename $(dirname $1))
        CONTAINER_INFO=$(docker inspect $CONTAINER_NAME 2>/dev/null | jq -r '.[0].Config.Labels["service.name"]' 2>/dev/null)
        if [[ "$CONTAINER_INFO" != "grafana" ]] && [[ "$CONTAINER_INFO" != "prometheus" ]]; then
            exit 1
        fi
    endscript
}

# Grafana plugin logs
/var/log/grafana/plugins/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 grafana grafana
    
    postrotate
        # Plugin logs don't need special handling
        find /var/log/grafana/plugins -name "*.log.*.gz" -mtime +30 -delete 2>/dev/null || true
    endscript
}

# Grafana alerting logs (if enabled)
/var/log/grafana/alerting/*.log {
    daily
    rotate 90
    compress
    delaycompress
    missingok
    notifempty
    create 0644 grafana grafana
    
    # Keep alerting logs longer for analysis
    maxage 90
    
    postrotate
        # Clean up old alerting logs
        find /var/log/grafana/alerting -name "*.log.*.gz" -mtime +90 -delete 2>/dev/null || true
    endscript
}

# Grafana audit logs (if enabled)
/var/log/grafana/audit/*.log {
    daily
    rotate 365
    compress
    delaycompress
    missingok
    notifempty
    create 0644 grafana grafana
    
    # Keep audit logs for compliance (1 year)
    maxage 365
    
    postrotate
        # Ensure audit log integrity
        chmod 0400 /var/log/grafana/audit/*.log.*.gz 2>/dev/null || true
    endscript
}

# Monitoring metrics logs
/var/log/monitoring/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0644 monitoring monitoring
    
    postrotate
        # Clean up monitoring logs
        find /var/log/monitoring -name "*.log.*.gz" -mtime +30 -delete 2>/dev/null || true
    endscript
}

# Node exporter logs
/var/log/node-exporter/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 node-exporter node-exporter
    
    # Node exporter logs are less critical, shorter retention
    maxage 7
}

# cAdvisor logs
/var/log/cadvisor/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 cadvisor cadvisor
    
    # cAdvisor logs are less critical, shorter retention
    maxage 7
}

# Backup logs
/var/log/grafana/backup/*.log {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    create 0644 grafana grafana
    
    # Keep backup logs for 3 months
    maxage 90
    
    postrotate
        # Cleanup old backup logs
        find /var/log/grafana/backup -name "*.log.*.gz" -mtime +90 -delete 2>/dev/null || true
    endscript
}

# Performance logs
/var/log/grafana/performance/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0644 grafana grafana
    
    # Performance logs for 2 weeks
    maxage 14
    
    postrotate
        # Generate performance summary if script exists
        if [ -x /opt/grafana/scripts/performance-summary.sh ]; then
            /opt/grafana/scripts/performance-summary.sh 2>/dev/null || true
        fi
    endscript
}

