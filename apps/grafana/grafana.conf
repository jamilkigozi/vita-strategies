# Grafana Monitoring Platform Configuration
# File: grafana.conf
# Purpose: Advanced configuration settings for production deployment

[application]
# Application identification
name = "Vita Strategies Monitoring"
description = "Enterprise Monitoring and Observability Platform"
version = "10.4.2"
environment = "production"

# Server configuration
[server]
protocol = "http"
http_port = 3000
domain = "monitoring.vitastrategies.com"
root_url = "https://monitoring.vitastrategies.com"
serve_from_sub_path = false
router_logging = false
static_root_path = "public"
enable_gzip = true
cert_file = ""
cert_key = ""
socket = ""
socket_gid = -1
socket_mode = 0660
grpc_port = 10000
grpc_tls_port = 10001

# Database configuration
[database]
type = "postgres"
host = "postgres:5432"
name = "grafana"
user = "grafana_user"
# Password set via environment variable
ssl_mode = "require"
ca_cert_path = ""
client_cert_path = ""
client_key_path = ""
server_cert_name = ""
path = "grafana.db"
max_idle_conn = 5
max_open_conn = 20
conn_max_lifetime = 14400
log_queries = false
query_retries = 0
transaction_retries = 5

# Remote database cache
cache_ttl = 4000

# Security configuration
[security]
disable_initial_admin_creation = false
admin_user = "admin"
# Admin password set via environment variable
admin_email = "admin@vitastrategies.com"
secret_key = ""  # Set via environment variable
encryption_provider = "secretKey.v1"
available_encryption_providers = ""
login_remember_days = 7
cookie_username = "grafana_user"
cookie_remember_name = "grafana_remember"
disable_gravatar = true
data_source_proxy_whitelist = ""
disable_brute_force_login_protection = false
cookie_secure = true
cookie_samesite = "strict"
allow_embedding = false
strict_transport_security = true
strict_transport_security_max_age_seconds = 86400
strict_transport_security_preload = false
strict_transport_security_subdomains = false
x_content_type_options = true
x_xss_protection = true
content_type_protection = true
disable_gravatar = true

# Session configuration
[session]
provider = "redis"
provider_config = "addr=redis:6379,pool_size=100,db=0"
cookie_name = "grafana_sess"
cookie_secure = true
session_life_time = 86400
gc_interval_time = 86400
conn_max_lifetime = 14400

# Analytics configuration
[analytics]
reporting_enabled = false
google_analytics_ua_id = ""
google_tag_manager_id = ""
rudderstack_write_key = ""
rudderstack_data_plane_url = ""
rudderstack_sdk_url = ""
rudderstack_config_url = ""
application_insights_connection_string = ""
application_insights_endpoint_url = ""
check_for_updates = false
check_for_plugin_updates = false

# SMTP configuration
[smtp]
enabled = false
host = "smtp.gmail.com:587"
user = ""
password = ""
cert_file = ""
key_file = ""
skip_verify = false
from_address = "monitoring@vitastrategies.com"
from_name = "Vita Strategies Monitoring"
ehlo_identity = ""
startTLS_policy = ""

# Log configuration
[log]
mode = "console file"
level = "info"
filters = ""

# Console log settings
[log.console]
level = "info"
format = "console"

# File log settings
[log.file]
level = "info"
format = "text"
log_rotate = true
max_lines = 1000000
max_size_shift = 28
daily_rotate = true
max_days = 30

# Syslog settings
[log.syslog]
level = "info"
format = "text"
network = ""
address = ""
facility = ""
tag = ""

# Authentication configuration
[auth]
login_cookie_name = "grafana_session"
login_maximum_inactive_lifetime_duration = "7d"
login_maximum_lifetime_duration = "30d"
token_rotation_interval_minutes = 10
disable_login_form = false
disable_signout_menu = false
signout_redirect_url = ""
oauth_auto_login = false
oauth_state_cookie_max_age = 600
api_key_max_seconds_to_live = -1
sigv4_auth_enabled = false

# LDAP authentication
[auth.ldap]
enabled = false
config_file = "/etc/grafana/ldap.toml"
allow_sign_up = true
sync_cron = "0 0 1 * * *"
active_sync_enabled = true

# SAML authentication
[auth.saml]
enabled = false
name = "Keycloak SSO"
single_logout = true
allow_sign_up = true
cert_path = ""
key_path = ""
metadata_path = ""
metadata_url = ""
assertion_consumer_service_url = ""
single_logout_url = ""
signature_algorithm = ""
private_key_path = ""
public_cert_path = ""
attribute_name = "displayName"
attribute_login = "mail"
attribute_email = "mail"
attribute_groups = "groups"
attribute_role = ""
attribute_path = ""
attribute_org = ""
allowed_organizations = ""
org_mapping = ""
role_values_editor = ""
role_values_admin = ""
role_values_grafana_admin = ""

# OAuth generic
[auth.generic_oauth]
enabled = false
name = "OAuth"
allow_sign_up = false
client_id = ""
client_secret = ""
scopes = "user:email,read:org"
empty_scopes = false
email_attribute_name = "email:primary"
email_attribute_path = ""
login_attribute_path = ""
name_attribute_path = ""
id_token_attribute_name = ""
auth_url = ""
token_url = ""
api_url = ""
teams_url = ""
allowed_domains = ""
team_ids = ""
allowed_organizations = ""
role_attribute_path = ""
role_attribute_strict = false
allow_assign_grafana_admin = false
skip_org_role_sync = false
use_pkce = true

# Users configuration
[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_id = 1
auto_assign_org_role = Viewer
verify_email_enabled = false
login_hint = "email or username"
password_hint = "password"
default_theme = "dark"
external_manage_link_url = ""
external_manage_link_name = ""
external_manage_info = ""
viewers_can_edit = false
editors_can_admin = false
user_invite_max_lifetime_duration = "24h"
hidden_users = ""

# Anonymous access
[auth.anonymous]
enabled = false
org_name = "Main Org."
org_role = "Viewer"
hide_version = false

# Basic authentication
[auth.basic]
enabled = true

# API key authentication
[auth.api_key]
max_seconds_to_live = -1

# Proxy authentication
[auth.proxy]
enabled = false
header_name = "X-WEBAUTH-USER"
header_property = "username"
auto_sign_up = true
sync_ttl = 60
whitelist = ""
headers = ""
headers_encoded = false
enable_login_token = false

# Alerting configuration
[alerting]
enabled = true
execute_alerts = true
error_or_timeout = "alerting"
nodata_or_nullvalues = "no_data"
concurrent_render_limit = 5
evaluation_timeout_seconds = 30
notification_timeout_seconds = 30
max_attempts = 3
min_interval_seconds = 1
max_annotation_age = ""

# Annotations configuration
[annotations]
cleanupjob_batchsize = 100

# Explore configuration
[explore]
enabled = true

# Metrics configuration
[metrics]
enabled = true
basic_auth_username = "metrics"
basic_auth_password = ""
disable_total_stats = false

# Grafana Live configuration
[live]
max_connections = 100
allowed_origins = ""

# Plugin configuration
[plugins]
enable_alpha = false
app_tls_skip_verify_insecure = false
allow_loading_unsigned_plugins = ""
marketplace_url = "https://grafana.com/grafana/plugins/"

# Enterprise configuration
[enterprise]
license_path = ""

# Feature toggles
[feature_toggles]
enable = "publicDashboards,tempoSearch,prometheusAzureOverrideAudience"

# Panels configuration
[panels]
disable_sanitize_html = false

# Snapshots configuration
[snapshots]
external_enabled = false
external_snapshot_url = ""
external_snapshot_name = ""
snapshot_remove_expired = true
snapshot_TTL_days = 90

# Dashboards configuration
[dashboards]
versions_to_keep = 20
min_refresh_interval = "5s"
default_home_dashboard_path = ""

# Data sources configuration
[datasources]
datasource_limit = 5000

# Unified alerting configuration
[unified_alerting]
enabled = true
ha_listen_address = "0.0.0.0:9094"
ha_advertise_address = ""
ha_peers = ""
ha_peer_timeout = "15s"
ha_gossip_interval = "200ms"
ha_push_pull_interval = "60s"
execute_alerts = true
evaluation_timeout = "30s"
max_attempts = 1
min_interval = "10s"

# Query configuration
[query]
timeout = "30s"
max_concurrent_queries = 100

# Date formats
[date_formats]
full_date = "YYYY-MM-DD HH:mm:ss"
interval_second = "HH:mm:ss"
interval_minute = "HH:mm"
interval_hour = "MM/DD HH:mm"
interval_day = "MM/DD"
interval_month = "YYYY-MM"
interval_year = "YYYY"
use_browser_locale = false
default_timezone = "browser"

# External image storage
[external_image_storage]
provider = ""

# Azure Blob storage
[external_image_storage.azure_blob]
account_name = ""
account_key = ""
container_name = ""

# GCS storage
[external_image_storage.gcs]
key_file = ""
bucket = ""
path = ""

# S3 storage
[external_image_storage.s3]
endpoint = ""
path_style_access = false
bucket = ""
region = ""
path = ""
access_key = ""
secret_key = ""

# Webdav storage
[external_image_storage.webdav]
url = ""
public_url = ""
username = ""
password = ""

# Tracing configuration
[tracing.jaeger]
address = ""
always_included_tag = ""
sampler_type = ""
sampler_param = 1
sampling_server_url = ""
zipkin_propagation = false
disable_shared_zipkin_spans = false

# Rendering configuration
[rendering]
server_url = ""
callback_url = ""
concurrent_render_request_limit = 30
rendering_timeout = "20s"
rendering_ignore_https_errors = false

# Security configuration
[security.encryption]
data_keys_cache_ttl = "15m"
data_keys_cache_cleanup_interval = "1m"
