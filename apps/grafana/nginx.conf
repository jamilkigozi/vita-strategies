# Nginx configuration for Grafana Monitoring Platform
# File: nginx.conf

upstream grafana_backend {
    server grafana:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream prometheus_backend {
    server prometheus:9090 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=grafana_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=grafana_dashboard:10m rate=60r/s;
limit_req_zone $binary_remote_addr zone=grafana_login:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=prometheus_api:10m rate=20r/s;

server {
    listen 80;
    server_name monitoring.vitastrategies.com;
    
    # Security headers
    include /etc/nginx/snippets/security-headers.conf;
    
    # Redirect to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name monitoring.vitastrategies.com;
    
    # SSL Configuration
    ssl_certificate /etc/ssl/certs/vitastrategies.com.crt;
    ssl_certificate_key /etc/ssl/private/vitastrategies.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Security headers
    include /etc/nginx/snippets/security-headers.conf;
    
    # Additional headers for monitoring platform
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Content Security Policy for Grafana
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-eval' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        font-src 'self';
        connect-src 'self' wss: https:;
        frame-ancestors 'self';
        form-action 'self';
        base-uri 'self';
    " always;
    
    # Logging
    access_log /var/log/nginx/grafana_access.log main;
    error_log /var/log/nginx/grafana_error.log;
    
    # Client settings
    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;
    
    # Proxy settings
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
    proxy_busy_buffers_size 8k;
    
    # Login endpoint (stricter rate limiting)
    location /login {
        limit_req zone=grafana_login burst=10 nodelay;
        
        proxy_pass http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cache_bypass $http_upgrade;
    }
    
    # API endpoints (moderate rate limiting)
    location /api/ {
        limit_req zone=grafana_api burst=50 nodelay;
        
        proxy_pass http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cache_bypass $http_upgrade;
        
        # API-specific headers
        proxy_set_header Accept-Encoding gzip;
        
        # Longer timeouts for data queries
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # Dashboard and app resources
    location / {
        limit_req zone=grafana_dashboard burst=100 nodelay;
        
        proxy_pass http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_cache_bypass $http_upgrade;
        
        # Enable gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/json
            application/javascript
            application/xml+rss
            application/atom+xml
            image/svg+xml;
    }
    
    # WebSocket support for live dashboards
    location /api/live/ws {
        proxy_pass http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    
    # Static assets caching
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache static assets for longer
        expires 1M;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
        
        # Enable gzip for static assets
        gzip on;
        gzip_static on;
        gzip_vary on;
    }
    
    # Health check endpoint
    location /api/health {
        access_log off;
        proxy_pass http://grafana_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    # Metrics endpoint (protected)
    location /metrics {
        # Allow only internal networks
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        proxy_pass http://grafana_backend/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_pass_header Authorization;
    }
    
    # Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block access to backup files
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Security.txt
    location /.well-known/security.txt {
        return 301 https://vitastrategies.com/.well-known/security.txt;
    }
}

# Prometheus reverse proxy (internal access only)
server {
    listen 443 ssl http2;
    server_name prometheus.monitoring.vitastrategies.com;
    
    # SSL Configuration (shared)
    ssl_certificate /etc/ssl/certs/vitastrategies.com.crt;
    ssl_certificate_key /etc/ssl/private/vitastrategies.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Security headers
    include /etc/nginx/snippets/security-headers.conf;
    
    # Logging
    access_log /var/log/nginx/prometheus_access.log main;
    error_log /var/log/nginx/prometheus_error.log;
    
    # Restrict access to internal networks only
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    deny all;
    
    # Prometheus API
    location /api/ {
        limit_req zone=prometheus_api burst=30 nodelay;
        
        proxy_pass http://prometheus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Longer timeouts for complex queries
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # Prometheus web interface
    location / {
        proxy_pass http://prometheus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Basic authentication for web interface
        auth_basic "Prometheus Monitoring";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }
}

# Monitoring status page
server {
    listen 443 ssl http2;
    server_name status.monitoring.vitastrategies.com;
    
    # SSL Configuration (shared)
    ssl_certificate /etc/ssl/certs/vitastrategies.com.crt;
    ssl_certificate_key /etc/ssl/private/vitastrategies.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Security headers
    include /etc/nginx/snippets/security-headers.conf;
    
    # Simple status page
    location / {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "Monitoring Platform Status: OK\nTimestamp: $time_iso8601\n";
    }
    
    # Detailed health check
    location /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"healthy","timestamp":"$time_iso8601","services":{"grafana":"up","prometheus":"up"}}';
    }
}
