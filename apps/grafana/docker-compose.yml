version: '3.8'

services:
  # Grafana Monitoring Platform
  grafana:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: grafana-server
    hostname: grafana
    restart: unless-stopped
    
    # Environment variables
    environment:
      # Database configuration
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: postgres:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_USER: grafana_user
      GF_DATABASE_PASSWORD: ${GRAFANA_DB_PASSWORD}
      GF_DATABASE_SSL_MODE: require
      GF_DATABASE_MAX_OPEN_CONN: 20
      GF_DATABASE_MAX_IDLE_CONN: 5
      GF_DATABASE_CONN_MAX_LIFETIME: 14400
      
      # Server configuration
      GF_SERVER_PROTOCOL: http
      GF_SERVER_HTTP_PORT: 3000
      GF_SERVER_DOMAIN: monitoring.vitastrategies.com
      GF_SERVER_ROOT_URL: https://monitoring.vitastrategies.com
      GF_SERVER_SERVE_FROM_SUB_PATH: false
      
      # Security settings
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_SECRET_KEY: ${GRAFANA_SECRET_KEY}
      GF_SECURITY_DISABLE_GRAVATAR: true
      GF_SECURITY_COOKIE_SECURE: true
      GF_SECURITY_COOKIE_SAMESITE: strict
      GF_SECURITY_CONTENT_TYPE_PROTECTION: true
      GF_SECURITY_X_CONTENT_TYPE_OPTIONS: nosniff
      GF_SECURITY_X_XSS_PROTECTION: true
      
      # Session configuration
      GF_SESSION_PROVIDER: redis
      GF_SESSION_PROVIDER_CONFIG: addr=redis:6379,pool_size=100,db=0
      GF_SESSION_COOKIE_SECURE: true
      GF_SESSION_COOKIE_SAMESITE: strict
      GF_SESSION_SESSION_LIFE_TIME: 86400
      
      # Authentication - SAML/SSO
      GF_AUTH_SAML_ENABLED: ${GRAFANA_SAML_ENABLED:-false}
      GF_AUTH_SAML_NAME: "Keycloak SSO"
      GF_AUTH_SAML_SINGLE_LOGOUT: true
      GF_AUTH_SAML_ALLOW_SIGN_UP: true
      GF_AUTH_SAML_METADATA_URL: ${KEYCLOAK_URL}/realms/${KEYCLOAK_REALM}/protocol/saml/descriptor
      GF_AUTH_SAML_ASSERTION_CONSUMER_URL: https://monitoring.vitastrategies.com/login/saml
      GF_AUTH_SAML_SINGLE_LOGOUT_URL: https://monitoring.vitastrategies.com/logout
      
      # SMTP configuration
      GF_SMTP_ENABLED: ${GRAFANA_SMTP_ENABLED:-false}
      GF_SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com:587}
      GF_SMTP_USER: ${SMTP_USERNAME:-}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_ADMIN_EMAIL:-monitoring@vitastrategies.com}
      GF_SMTP_FROM_NAME: "Vita Strategies Monitoring"
      GF_SMTP_SKIP_VERIFY: false
      
      # Logging configuration
      GF_LOG_MODE: console,file
      GF_LOG_LEVEL: info
      GF_LOG_CONSOLE_LEVEL: info
      GF_LOG_FILE_LEVEL: info
      GF_LOG_FILE_PATH: /var/log/grafana/grafana.log
      GF_LOG_FILE_MAX_SIZE: 100MB
      GF_LOG_FILE_MAX_DAYS: 30
      
      # Metrics and monitoring
      GF_METRICS_ENABLED: true
      GF_METRICS_BASIC_AUTH_USERNAME: ${GRAFANA_METRICS_USER:-metrics}
      GF_METRICS_BASIC_AUTH_PASSWORD: ${GRAFANA_METRICS_PASSWORD}
      
      # Alerting configuration
      GF_ALERTING_ENABLED: true
      GF_ALERTING_EXECUTE_ALERTS: true
      GF_ALERTING_ERROR_OR_TIMEOUT: alerting
      GF_ALERTING_NODATA_OR_NULLVALUES: no_data
      GF_ALERTING_CONCURRENT_RENDER_LIMIT: 5
      
      # Feature toggles
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards,tempoSearch,prometheusAzureOverrideAudience"
      
      # Plugin configuration
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: ""
      GF_PLUGINS_ENABLE_ALPHA: false
      GF_INSTALL_PLUGINS: "${GRAFANA_INSTALL_PLUGINS:-}"
      
      # Analytics and tracking
      GF_ANALYTICS_REPORTING_ENABLED: false
      GF_ANALYTICS_CHECK_FOR_UPDATES: false
      GF_ANALYTICS_GOOGLE_ANALYTICS_UA_ID: ""
      
      # Snapshots
      GF_SNAPSHOTS_EXTERNAL_ENABLED: false
      GF_SNAPSHOTS_EXTERNAL_SNAPSHOT_URL: ""
      
      # Performance settings
      GF_EXPLORE_ENABLED: true
      GF_HELP_ENABLED: true
      GF_PROFILE_ENABLED: false
      
      # Additional security
      GF_USERS_ALLOW_SIGN_UP: false
      GF_USERS_ALLOW_ORG_CREATE: false
      GF_USERS_AUTO_ASSIGN_ORG: true
      GF_USERS_AUTO_ASSIGN_ORG_ID: 1
      GF_USERS_AUTO_ASSIGN_ORG_ROLE: Viewer
    
    # Port mappings
    ports:
      - "3000:3000"
    
    # Volume mounts
    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_logs:/var/log/grafana
      - grafana_plugins:/var/lib/grafana/plugins
      - grafana_dashboards:/var/lib/grafana/dashboards
      - grafana_provisioning:/etc/grafana/provisioning
      - ./config:/opt/grafana/config:ro
      - ./scripts:/opt/grafana/scripts:ro
    
    # Network configuration
    networks:
      - grafana_network
      - postgres_network
      - redis_network
      - monitoring_network
    
    # Dependency management
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    # Health check
    healthcheck:
      test: ["/opt/grafana/scripts/healthcheck.sh", "quick"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s
    
    # Labels
    labels:
      - "service.name=grafana"
      - "service.description=Monitoring and Observability Platform"
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`monitoring.vitastrategies.com`)"
      - "traefik.http.routers.grafana.tls=true"

  # PostgreSQL Database for Grafana
  postgres:
    image: postgres:15-alpine
    container_name: grafana-postgres
    hostname: postgres
    restart: unless-stopped
    
    environment:
      POSTGRES_DB: grafana
      POSTGRES_USER: grafana_user
      POSTGRES_PASSWORD: ${GRAFANA_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=en_US.UTF-8 --lc-ctype=en_US.UTF-8"
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    
    networks:
      - postgres_network
    
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grafana_user -d grafana"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Redis for Session Storage and Caching
  redis:
    image: redis:7-alpine
    container_name: grafana-redis
    hostname: redis
    restart: unless-stopped
    
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    
    volumes:
      - redis_data:/data
    
    networks:
      - redis_network
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus for Metrics Collection
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: grafana-prometheus
    hostname: prometheus
    restart: unless-stopped
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    
    volumes:
      - prometheus_data:/prometheus
      - ./prometheus:/etc/prometheus:ro
    
    networks:
      - monitoring_network
    
    ports:
      - "9090:9090"
    
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Node Exporter for System Metrics
  node-exporter:
    image: prom/node-exporter:v1.6.0
    container_name: grafana-node-exporter
    hostname: node-exporter
    restart: unless-stopped
    
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    
    networks:
      - monitoring_network
    
    ports:
      - "9100:9100"

  # cAdvisor for Container Metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: grafana-cadvisor
    hostname: cadvisor
    restart: unless-stopped
    
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    
    networks:
      - monitoring_network
    
    ports:
      - "8080:8080"

# Named volumes
volumes:
  grafana_data:
    driver: local
  grafana_logs:
    driver: local
  grafana_plugins:
    driver: local
  grafana_dashboards:
    driver: local
  grafana_provisioning:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local

# Networks
networks:
  grafana_network:
    driver: bridge
  postgres_network:
    driver: bridge
    internal: true
  redis_network:
    driver: bridge
    internal: true
  monitoring_network:
    driver: bridge
