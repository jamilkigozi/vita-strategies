# Log rotation configuration for Windmill
# Manages log files to prevent disk space issues

# Windmill application logs
/var/log/windmill/*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 644 windmill windmill
    sharedscripts
    postrotate
        # Restart supervisor processes to reopen log files
        if command -v supervisorctl >/dev/null 2>&1; then
            supervisorctl restart windmill-server >/dev/null 2>&1 || true
            supervisorctl restart windmill-worker:* >/dev/null 2>&1 || true
        fi
    endscript
}

# Supervisor logs
/var/log/supervisor/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 644 root root
    postrotate
        if [ -f /var/run/supervisord.pid ]; then
            kill -USR2 $(cat /var/run/supervisord.pid)
        fi
    endscript
}

# Windmill server specific logs
/var/log/windmill/server.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 644 windmill windmill
    postrotate
        # Signal windmill server to reopen log files
        if pgrep -f "windmill server" >/dev/null; then
            pkill -USR1 -f "windmill server"
        fi
    endscript
}

# Windmill worker logs
/var/log/windmill/worker*.log {
    daily
    missingok
    rotate 30
    compress
    delaycompress
    notifempty
    create 644 windmill windmill
    postrotate
        # Signal windmill workers to reopen log files
        if pgrep -f "windmill worker" >/dev/null; then
            pkill -USR1 -f "windmill worker"
        fi
    endscript
}

# Windmill metrics logs
/var/log/windmill/metrics.log {
    weekly
    missingok
    rotate 12
    compress
    delaycompress
    notifempty
    create 644 windmill windmill
    postrotate
        # Signal windmill metrics to reopen log files
        if pgrep -f "windmill metrics" >/dev/null; then
            pkill -USR1 -f "windmill metrics"
        fi
    endscript
}

# Workflow execution logs (if any)
/var/log/windmill/execution*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 644 windmill windmill
}

# Backup logs
/var/log/windmill/backup.log {
    weekly
    missingok
    rotate 12
    compress
    delaycompress
    notifempty
    create 644 windmill windmill
}

# System health check logs
/var/log/windmill/healthcheck.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    create 644 windmill windmill
}

# Database logs (if local PostgreSQL)
/var/log/postgresql/*.log {
    daily
    missingok
    rotate 7
    compress
    delaycompress
    notifempty
    create 640 postgres postgres
    sharedscripts
    postrotate
        if [ -f /var/run/postgresql/postmaster.pid ]; then
            kill -USR1 $(cat /var/run/postgresql/postmaster.pid)
        fi
    endscript
}

# Redis logs (if local Redis)
/var/log/redis/*.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 640 redis redis
    postrotate
        # Redis handles log rotation internally
        if [ -f /var/run/redis/redis-server.pid ]; then
            kill -USR1 $(cat /var/run/redis/redis-server.pid)
        fi
    endscript
}

# Nginx logs (if running locally)
/var/log/nginx/*.log {
    daily
    missingok
    rotate 52
    compress
    delaycompress
    notifempty
    create 644 nginx nginx
    sharedscripts
    postrotate
        if [ -f /var/run/nginx.pid ]; then
            kill -USR1 $(cat /var/run/nginx.pid)
        fi
    endscript
}
